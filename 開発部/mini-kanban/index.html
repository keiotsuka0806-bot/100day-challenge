<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Kanban</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3f51b5">
</head>
<body>

  <!-- ログイン画面 -->
  <div id="screen-login" class="screen">
    <div class="login-card">
      <div class="login-icon">📋</div>
      <h1>Mini Kanban</h1>
      <p>チームのタスクをシンプルに管理。<br>招待された人だけが見られるプライベートボード。</p>
      <button id="loginBtn" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Googleでログイン
      </button>
    </div>
  </div>

  <!-- ボード一覧画面 -->
  <div id="screen-boards" class="screen hidden">
    <header class="app-header">
      <span class="app-title">📋 Mini Kanban</span>
      <div class="header-right">
        <img id="userAvatar" class="avatar" src="" alt="">
        <span id="userName" class="user-name"></span>
        <button id="logoutBtn" class="btn-text">ログアウト</button>
      </div>
    </header>
    <main class="boards-main">
      <div class="boards-top">
        <h2>マイボード</h2>
        <button id="newBoardBtn" class="btn-primary">＋ 新しいボード</button>
      </div>
      <div id="boardsList" class="boards-grid"></div>
    </main>
  </div>

  <!-- カンバンボード画面 -->
  <div id="screen-board" class="screen hidden">
    <header class="board-header">
      <button id="backBtn" class="btn-icon" title="一覧へ戻る">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <h1 id="boardNameTitle" class="board-title"></h1>
      <div class="header-right">
        <button id="shareBoardBtn" class="btn-icon-text">🔗 URLをコピー</button>
        <button id="settingsBtn" class="btn-icon" title="ボード設定">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>
    <div class="board">
      <div class="column" data-column="todo">
        <div class="column-header">
          <span class="column-dot dot-todo"></span>
          <span class="column-title">Todo</span>
          <span class="card-count" id="count-todo">0</span>
          <button class="add-btn" data-column="todo">＋</button>
        </div>
        <div class="cards" id="cards-todo"></div>
      </div>
      <div class="column" data-column="inprogress">
        <div class="column-header">
          <span class="column-dot dot-inprogress"></span>
          <span class="column-title">In Progress</span>
          <span class="card-count" id="count-inprogress">0</span>
          <button class="add-btn" data-column="inprogress">＋</button>
        </div>
        <div class="cards" id="cards-inprogress"></div>
      </div>
      <div class="column" data-column="done">
        <div class="column-header">
          <span class="column-dot dot-done"></span>
          <span class="column-title">Done</span>
          <span class="card-count" id="count-done">0</span>
          <button class="add-btn" data-column="done">＋</button>
        </div>
        <div class="cards" id="cards-done"></div>
      </div>
    </div>
  </div>

  <!-- 設定パネル（オーナーのみ） -->
  <div id="settingsPanel" class="side-panel hidden">
    <div id="panelBackdrop" class="panel-backdrop"></div>
    <div class="panel-body">
      <div class="panel-header">
        <h3>ボード設定</h3>
        <button id="closeSettingsBtn" class="btn-icon close-btn">✕</button>
      </div>
      <div class="panel-section">
        <label class="field-label">ボード名</label>
        <div class="panel-row">
          <input type="text" id="boardNameInput" maxlength="50">
          <button id="saveBoardNameBtn" class="btn-primary">保存</button>
        </div>
      </div>
      <div class="panel-section">
        <label class="field-label">メンバーを招待</label>
        <div class="panel-row">
          <input type="email" id="inviteEmail" placeholder="example@gmail.com">
          <button id="inviteBtn" class="btn-primary">追加</button>
        </div>
        <p class="hint">招待されたユーザーがGoogleログインすると自動的にアクセスできます。</p>
        <div id="membersList" class="members-list"></div>
      </div>
      <div class="panel-section danger-zone">
        <p class="danger-label">危険ゾーン</p>
        <button id="deleteBoardBtn" class="btn-danger-full">このボードを削除</button>
      </div>
    </div>
  </div>

  <!-- カード追加・編集モーダル -->
  <div class="modal-overlay" id="cardOverlay">
    <div class="modal">
      <h3 id="modalTitle">カードを追加</h3>
      <input type="text" id="cardTitle" placeholder="タスクのタイトル" maxlength="100" autocomplete="off">
      <div class="field-group">
        <label class="field-label">締め切り</label>
        <input type="date" id="cardDue">
      </div>
      <div class="field-group">
        <label class="field-label">ラベルカラー</label>
        <div class="colors">
          <button class="color-btn" data-color="" style="background:#e0e0e0" title="なし"></button>
          <button class="color-btn" data-color="red" style="background:#ef5350" title="赤"></button>
          <button class="color-btn" data-color="orange" style="background:#ff9800" title="オレンジ"></button>
          <button class="color-btn" data-color="yellow" style="background:#fdd835" title="黄"></button>
          <button class="color-btn" data-color="green" style="background:#66bb6a" title="緑"></button>
          <button class="color-btn" data-color="blue" style="background:#42a5f5" title="青"></button>
          <button class="color-btn" data-color="purple" style="background:#ab47bc" title="紫"></button>
        </div>
      </div>
      <div class="modal-actions">
        <button id="saveCardBtn" class="btn-primary">保存</button>
        <button id="deleteCardBtn" class="btn-danger">削除</button>
        <button id="cancelCardBtn" class="btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 新規ボードモーダル -->
  <div class="modal-overlay" id="newBoardOverlay">
    <div class="modal">
      <h3>新しいボードを作成</h3>
      <input type="text" id="newBoardName" placeholder="ボード名（例: 開発タスク）" maxlength="50" autocomplete="off">
      <div class="modal-actions">
        <button id="createBoardBtn" class="btn-primary">作成</button>
        <button id="cancelNewBoardBtn" class="btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
