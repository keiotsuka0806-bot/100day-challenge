<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>今日なに食べる？</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e86a3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ── ログイン画面 ── -->
<div id="loginScreen">
  <div style="font-size:3.5rem">🍽️</div>
  <h1>今日なに食べる？</h1>
  <p>毎日の献立をPFCバランスで<br>スマートに提案します</p>
  <button class="btn-google" onclick="firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider())">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Googleでログイン
  </button>
</div>

<!-- ── メイン画面 ── -->
<div id="mainScreen">

  <!-- トップバー -->
  <div class="top-bar">
    <h1>🍽️ 今日なに食べる？</h1>
    <button onclick="firebase.auth().signOut()">ログアウト</button>
  </div>

  <!-- タブ: ホーム -->
  <div id="tab-home" class="tab-content active">

    <!-- PFCバー -->
    <div class="pfc-section">
      <div class="pfc-label">今日のPFC達成率</div>
      <div class="pfc-bars">
        <div class="pfc-bar-row">
          <span class="pfc-name">P</span>
          <div class="pfc-track"><div class="pfc-fill p" id="pfc-fill-p" style="width:0%"></div></div>
          <span class="pfc-pct" id="pfc-pct-p">0%</span>
        </div>
        <div class="pfc-bar-row">
          <span class="pfc-name">F</span>
          <div class="pfc-track"><div class="pfc-fill f" id="pfc-fill-f" style="width:0%"></div></div>
          <span class="pfc-pct" id="pfc-pct-f">0%</span>
        </div>
        <div class="pfc-bar-row">
          <span class="pfc-name">C</span>
          <div class="pfc-track"><div class="pfc-fill c" id="pfc-fill-c" style="width:0%"></div></div>
          <span class="pfc-pct" id="pfc-pct-c">0%</span>
        </div>
      </div>
    </div>

    <!-- 気分タグ -->
    <div class="mood-section">
      <div class="section-title">今日の気分は？（複数選択OK）</div>

      <div class="tag-group">
        <div class="tag-group-label">料理系</div>
        <div class="tags">
          <span class="tag" onclick="toggleMood('和食', this)">和食</span>
          <span class="tag" onclick="toggleMood('洋食', this)">洋食</span>
          <span class="tag" onclick="toggleMood('中華', this)">中華</span>
          <span class="tag" onclick="toggleMood('イタリアン', this)">イタリアン</span>
        </div>
      </div>

      <div class="tag-group">
        <div class="tag-group-label">食材系</div>
        <div class="tags">
          <span class="tag" onclick="toggleMood('肉', this)">肉</span>
          <span class="tag" onclick="toggleMood('魚', this)">魚</span>
          <span class="tag" onclick="toggleMood('野菜', this)">野菜</span>
          <span class="tag" onclick="toggleMood('卵・豆腐', this)">卵・豆腐</span>
        </div>
      </div>

      <div class="tag-group">
        <div class="tag-group-label">気分</div>
        <div class="tags">
          <span class="tag" onclick="toggleMood('さっぱり', this)">さっぱり</span>
          <span class="tag" onclick="toggleMood('がっつり', this)">がっつり</span>
          <span class="tag" onclick="toggleMood('温かい', this)">温かい</span>
          <span class="tag" onclick="toggleMood('冷たい', this)">冷たい</span>
        </div>
      </div>
    </div>

    <!-- 主食選択 -->
    <div class="staple-section">
      <div class="section-title">主食</div>
      <div class="staple-btns">
        <button class="staple-btn active" onclick="selectStaple('rice', this)">🍚 ごはん</button>
        <button class="staple-btn" onclick="selectStaple('bread', this)">🍞 パン</button>
        <button class="staple-btn" onclick="selectStaple('noodle', this)">🍜 麺類</button>
        <button class="staple-btn" onclick="selectStaple('none', this)">なし</button>
      </div>
    </div>

    <!-- 時間フィルター -->
    <div class="time-filter">
      <label>調理時間</label>
      <select id="timeFilter">
        <option value="0">制限なし</option>
        <option value="15">15分以内</option>
        <option value="30">30分以内</option>
      </select>
    </div>

    <!-- 決めるボタン -->
    <div class="decide-section">
      <button class="btn-decide" onclick="decideMeal()">🎰 献立を決める！</button>
    </div>

    <!-- 献立カード -->
    <div class="meal-set" id="mealSetContainer"></div>

    <!-- フッター（合計PFC + 食べた！） -->
    <div class="meal-footer hidden" id="mealFooter">
      <div class="total-pfc">合計 <strong id="totalPfc">—</strong></div>
      <button class="btn-ate" onclick="showTimingPicker()">食べた！✓</button>
    </div>

  </div><!-- /tab-home -->

  <!-- タブ: 履歴 -->
  <div id="tab-history" class="tab-content">
    <div class="history-section">
      <div class="section-title">食事履歴</div>
      <div class="history-list" id="historyList">
        <div class="empty-state">
          <div class="empty-icon">🍽️</div>
          <p>まだ記録がありません</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ボトムナビ -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="switchTab('home')">
      <span class="nav-icon">🏠</span>ホーム
    </button>
    <button class="nav-btn" id="nav-history" onclick="switchTab('history')">
      <span class="nav-icon">📋</span>履歴
    </button>
  </nav>

</div><!-- /mainScreen -->

<!-- 食事タイミング選択 -->
<div class="modal-overlay" id="timingModal" onclick="if(event.target===this)closeTimingPicker()">
  <div class="modal-sheet" style="padding:1.5rem 1.25rem 2rem">
    <div class="modal-header" style="border:none;padding:0 0 1rem">
      <h2>いつ食べましたか？</h2>
      <button class="btn-close" onclick="closeTimingPicker()">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:.75rem">
      <button class="timing-btn" onclick="selectTiming('breakfast')">🌅 朝食</button>
      <button class="timing-btn" onclick="selectTiming('lunch')">☀️ 昼食</button>
      <button class="timing-btn" onclick="selectTiming('dinner')">🌙 夕食</button>
    </div>
  </div>
</div>

<!-- レシピモーダル -->
<div class="modal-overlay" id="recipeModal" onclick="if(event.target===this)closeRecipe()">
  <div class="modal-sheet">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="btn-close" onclick="closeRecipe()">✕</button>
    </div>
    <div class="modal-body">
      <img class="modal-img" id="modalImg" alt="">
      <div class="recipe-section-title">材料</div>
      <div class="ingredients" id="modalIngredients"></div>
      <div class="recipe-section-title" id="descLabel">説明</div>
      <p id="modalDescription" style="font-size:.875rem;color:var(--text-sub);line-height:1.6"></p>
      <a class="recipe-link" id="modalLink" href="#" target="_blank" rel="noopener">
        楽天レシピで作り方を見る →
      </a>
    </div>
  </div>
</div>

<!-- ローディング -->
<div class="loading-overlay" id="loadingOverlay" style="display:none">
  <div class="spinner"></div>
  <span id="loadingMsg">読み込み中…</span>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- アプリ -->
<script src="config.js"></script>
<script src="pfc-table.js"></script>
<script src="fallback-recipes.js"></script>
<script src="rakuten-api.js"></script>
<script src="recommender.js"></script>
<script src="app.js"></script>

<!-- PWA -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
  }
</script>

</body>
</html>
