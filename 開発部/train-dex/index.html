<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0e1730" />
  <title>TrainDex — 鉄道さがしの宝探し</title>
  <meta name="description" content="駅やホームで見つけた路面電車・電車・新幹線をカメラで撮って図鑑にコレクション。形式も確度も出る、現実世界の宝探し。" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="TrainDex — 鉄道さがしの宝探し" />
  <meta property="og:description" content="路面電車・電車・新幹線をカメラで撮ると、AIが事業者・形式を鑑定。レアを集める現実世界の鉄道図鑑。" />
  <meta property="og:image" content="icon.svg" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="TrainDex — 鉄道さがしの宝探し" />
  <meta name="twitter:description" content="路面電車・電車・新幹線をカメラで撮ると、AIが事業者・形式を鑑定。レアを集める現実世界の鉄道図鑑。" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-mark">🚉</span> TrainDex</div>
    <div class="stat-chips">
      <span class="chip" id="chipSpecies">0形式</span>
      <span class="chip" id="chipTotal">0回</span>
    </div>
  </header>

  <main>
    <!-- さがす画面 -->
    <section id="view-hunt" class="view">
      <div class="hunt-hero">
        <p class="hunt-lead">路面電車・電車・新幹線を撮って、自分で記録しよう。</p>
        <p class="hunt-sub">撮ったら事業者・形式を自分で入力（あなたの記録が正解）。形式がわからない時はAIに推測してもらえます。</p>
        <label class="btn-hunt">
          <input type="file" id="fileInput" accept="image/*" capture="environment" hidden />
          📷 さがす（撮影）
        </label>
        <p class="privacy-note">写り込んだ人の顔は、記録画面で指でなぞって隠せます。元の写真はサーバーに残しません。</p>
        <p class="mode-note hidden" id="modeNote"></p>
      </div>
    </section>

    <!-- 図鑑画面 -->
    <section id="view-dex" class="view hidden">
      <div class="dex-filters" id="dexFilters">
        <button class="filter-btn active" data-cat="all">すべて</button>
        <button class="filter-btn" data-cat="master-sk">📕 新幹線図鑑</button>
        <button class="filter-btn" data-cat="shinkansen">🚄 新幹線</button>
        <button class="filter-btn" data-cat="local">🚃 在来線・私鉄</button>
        <button class="filter-btn" data-cat="tram">🚋 路面電車</button>
      </div>
      <div id="masterHead" class="master-head hidden"></div>
      <div id="achievements" class="achievements"></div>
      <div id="dexGrid" class="dex-grid"></div>
      <p id="dexEmpty" class="dex-empty">まだ図鑑は空っぽ。<br>「さがす」で最初の1両を見つけよう。</p>
    </section>
  </main>

  <!-- 下部ナビ -->
  <nav class="tabbar">
    <button class="tab active" data-view="hunt">🔎 さがす</button>
    <button class="tab" data-view="dex">📖 図鑑</button>
  </nav>

  <!-- 鑑定中オーバーレイ -->
  <div id="scanOverlay" class="overlay hidden">
    <div class="scan-box">
      <div class="scan-line"></div>
      <div class="scan-emoji">🔍</div>
    </div>
    <p>鑑定中…</p>
  </div>

  <!-- 結果モーダル -->
  <div id="resultModal" class="modal hidden">
    <div class="modal-card" id="resultCard"></div>
  </div>

  <!-- 訂正モーダル -->
  <div id="correctModal" class="modal hidden">
    <div class="modal-card" id="correctCard"></div>
  </div>

  <div id="reveal" class="reveal hidden"></div>

  <script src="app.js"></script>
</body>
</html>
