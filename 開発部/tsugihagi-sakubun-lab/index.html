<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>AI乱入大喜利 — みんなとAIでボケて、みんなで投票</title>
<meta name="description" content="合言葉で集まって各自のスマホでお題にボケる。AIもこっそり参戦。みんなで投票して一番おもしろい回答を決めるオンライン大喜利。AIに勝てるか？" />
<meta name="theme-color" content="#ff5d8f" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">

  <!-- トップ -->
  <section id="screenTop" class="screen is-active">
    <div class="hero">
      <div class="logo">AI乱入<br>大喜利</div>
      <p class="lead">みんなのスマホで<strong>お題にボケ</strong>。<br><strong>AIもこっそり参戦</strong>。投票で一番を決める。</p>
      <button class="btn btn--big btn--primary" id="toCreate">部屋を作る</button>
      <button class="btn btn--big" id="toJoin">部屋に参加する</button>
    </div>
  </section>

  <!-- 部屋を作る -->
  <section id="screenCreate" class="screen">
    <h2 class="h2">部屋を作る（あなたがホスト）</h2>
    <label class="field">
      <span class="field__label">あなたの名前</span>
      <input id="hostName" type="text" maxlength="12" placeholder="例：けい" />
    </label>
    <div class="field">
      <span class="field__label">お題の数（ラウンド）</span>
      <div class="counter">
        <button class="counter__btn" id="rMinus" aria-label="減らす">−</button>
        <span class="counter__num" id="roundCount">3</span>
        <span class="counter__unit">問</span>
        <button class="counter__btn" id="rPlus" aria-label="増やす">＋</button>
      </div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="aiToggle" checked />
      <span class="toggle__box"></span>
      <span class="toggle__label">🤖 AIを参戦させる<small>（毎ラウンド、AIもボケを1つ出す）</small></span>
    </label>
    <button class="btn btn--big btn--primary" id="createRoom">部屋を作成</button>
    <button class="btn btn--text" id="createBack">← もどる</button>
    <p id="createMsg" class="msg"></p>
  </section>

  <!-- 部屋に参加 -->
  <section id="screenJoin" class="screen">
    <h2 class="h2">部屋に参加</h2>
    <label class="field">
      <span class="field__label">合言葉（4文字）</span>
      <input id="joinCode" type="text" maxlength="4" autocapitalize="characters" placeholder="ABCD" class="codeInput" />
    </label>
    <label class="field">
      <span class="field__label">あなたの名前</span>
      <input id="joinName" type="text" maxlength="12" placeholder="例：たつろう" />
    </label>
    <button class="btn btn--big btn--primary" id="joinRoom">参加する</button>
    <button class="btn btn--text" id="joinBack">← もどる</button>
    <p id="joinMsg" class="msg"></p>
  </section>

  <!-- ロビー -->
  <section id="screenLobby" class="screen">
    <h2 class="h2">仲間を待っています</h2>
    <div class="lobbyCode">
      <span class="lobbyCode__label">合言葉</span>
      <span class="lobbyCode__value" id="lobbyCode">----</span>
    </div>
    <div class="qrBox">
      <div id="qr"></div>
      <p class="qrBox__hint">このQRを読む／合言葉を入力／下のURLを開く、どれでも参加できます</p>
      <p id="lobbyUrl" class="qrBox__url"></p>
    </div>
    <button class="btn" id="copyInvite">📋 招待リンクをコピー</button>
    <p class="playersCount"><span id="playersCount">参加者 1人</span>　<small>2人から開始OK・人数の上限なし</small></p>
    <div class="players" id="lobbyPlayers"></div>
    <div id="lobbyHostArea" hidden>
      <button class="btn btn--big btn--primary" id="startGame">ゲーム開始</button>
    </div>
    <p id="lobbyWait" class="msg">ホストが開始するのを待っています…</p>
    <p id="lobbyMsg" class="msg"></p>
  </section>

  <!-- ボケ入力 -->
  <section id="screenAnswer" class="screen">
    <div class="inputTop">
      <span class="pill" id="answerRound">第1問</span>
    </div>
    <div class="card">
      <span class="card__label">お題</span>
      <p class="card__text" id="answerPrompt">—</p>
    </div>
    <label class="field">
      <span class="field__label">あなたのボケをひと言</span>
      <textarea id="answerInput" rows="2" maxlength="40" placeholder="ここにボケを書く…"></textarea>
      <span class="field__hint"><span id="answerCount">0</span>/40字</span>
    </label>
    <button class="btn btn--big btn--primary" id="submitAnswer">ボケを送信</button>
    <p id="answerMsg" class="msg"></p>
  </section>

  <!-- 待機 -->
  <section id="screenWait" class="screen">
    <div class="loading">
      <div class="spinner"></div>
      <p id="waitText">みんなの入力を待っています…</p>
      <p id="waitCount" class="waitCount"></p>
      <button class="btn btn--text" id="hostSkip" hidden>（ホスト）待たずに進む</button>
    </div>
  </section>

  <!-- 投票 -->
  <section id="screenVote" class="screen">
    <div class="inputTop">
      <span class="pill" id="voteRound">第1問</span>
      <span class="topic">一番おもしろいボケに投票</span>
    </div>
    <div class="card card--mini">
      <span class="card__label">お題</span>
      <p class="card__text" id="votePrompt">—</p>
    </div>
    <div id="voteList" class="voteList"></div>
    <p id="voteMsg" class="msg"></p>
  </section>

  <!-- ラウンド結果 -->
  <section id="screenReveal" class="screen">
    <h2 class="h2" id="revealTitle">第1問の結果</h2>
    <div id="revealList" class="rrList"></div>
    <div class="mc"><span class="mc__face">🎤</span><p id="revealMc"></p></div>
    <button class="btn btn--big btn--primary" id="revealNext" hidden>次へ</button>
    <p id="revealWait" class="msg">ホストを待っています…</p>
  </section>

  <!-- 最終結果 -->
  <section id="screenFinal" class="screen">
    <div class="finalTop">
      <div class="crown">👑</div>
      <p class="finalLabel">優勝</p>
      <h2 class="finalChamp" id="finalChamp">—</h2>
      <p class="finalMc" id="finalMc"></p>
    </div>
    <div id="finalBoard" class="board"></div>
    <div class="result__actions">
      <button class="btn" id="copyFinal">📋 結果をコピー</button>
      <button class="btn btn--primary" id="playAgain" hidden>もう一度遊ぶ</button>
      <button class="btn btn--text" id="leaveRoom">トップへ戻る</button>
    </div>
    <p id="finalMsg" class="msg"></p>
  </section>

</div>

<footer class="foot">AI乱入大喜利 — #100Day Challenge</footer>

<!-- Firebase（リアルタイム同期） -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script src="firebase-config.js" onerror="window.__noFirebaseConfig=true"></script>
<script src="prompts.js"></script>
<script src="app.js"></script>
</body>
</html>
