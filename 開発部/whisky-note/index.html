<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>WhiskyNote</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">
        <span class="login-logo-icon">🥃</span>
        <h1 class="login-logo-text">WhiskyNote</h1>
      </div>
      <p class="login-desc">ウイスキーの記録を管理し、<br>仲間と共有しましょう</p>
      <button class="btn-google-signin" id="googleSignInBtn">
        <svg viewBox="0 0 48 48" width="20" height="20" style="flex-shrink:0">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Googleでサインイン
      </button>
    </div>
  </div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-logo">
        <span class="logo-icon">🥃</span>
        <span class="logo-text">WhiskyNote</span>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="sortBtn" aria-label="並び替え">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="search-bar" id="searchBar">
      <input type="text" id="searchInput" placeholder="銘柄・蒸留所で検索..." autocomplete="off">
      <button class="btn-icon" id="clearSearchBtn" aria-label="クリア">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Sort Menu -->
  <div class="sort-menu" id="sortMenu">
    <div class="sort-menu-inner">
      <p class="sort-label">並び替え</p>
      <button class="sort-option active" data-sort="date-desc">新着順</button>
      <button class="sort-option" data-sort="date-asc">古い順</button>
      <button class="sort-option" data-sort="rating-desc">評価が高い順</button>
      <button class="sort-option" data-sort="rating-asc">評価が低い順</button>
      <button class="sort-option" data-sort="name-asc">名前順 (A→Z)</button>
      <div class="sort-menu-divider"></div>
      <p class="sort-label">データ管理</p>
      <button class="sort-option" id="exportBtn">📤 書き出す（エクスポート）</button>
      <button class="sort-option" id="importBtn">📥 読み込む（インポート）</button>
      <input type="file" id="importInput" accept=".json" hidden>
      <div class="sort-menu-divider"></div>
      <p class="sort-label" id="currentUserLabel">ユーザー</p>
      <button class="sort-option" id="signOutBtn">🚪 サインアウト</button>
    </div>
  </div>
  <div class="overlay" id="sortOverlay"></div>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-item">
        <span class="stat-value" id="totalCount">0</span>
        <span class="stat-label">本</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="avgRating">-</span>
        <span class="stat-label">平均評価</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="topRated">-</span>
        <span class="stat-label">最高評価</span>
      </div>
    </div>

    <!-- My Collection Label (shown when wiki results are visible) -->
    <div class="section-label" id="myCollectionLabel" hidden>📦 マイコレクション</div>

    <!-- List View -->
    <div class="whisky-grid" id="whiskyGrid"></div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🥃</div>
      <h2>まだ記録がありません</h2>
      <p>右下の＋ボタンからウイスキーを<br>追加してみましょう</p>
    </div>

    <!-- Community Section -->
    <div id="communitySection" hidden>
      <div class="section-label community-section-label">
        👥 コミュニティの記録
      </div>
      <div class="whisky-grid" id="communityGrid"></div>
    </div>

    <!-- Wikipedia Section -->
    <div id="wikiSection" hidden>
      <div class="section-label wiki-section-label">
        📖 ウイスキーデータベース
      </div>
      <div id="wikiResults"></div>
    </div>
  </main>

  <!-- FAB -->
  <button class="fab" id="addBtn" aria-label="追加">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- Modal Backdrop -->
  <div class="modal-backdrop" id="modalBackdrop"></div>

  <!-- Add/Edit Modal -->
  <div class="modal" id="whiskyModal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <button class="btn-icon modal-close" id="modalCloseBtn" aria-label="閉じる">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <h2 class="modal-title" id="modalTitle">ウイスキーを追加</h2>
      <button class="btn-save" id="saveBtn">保存</button>
    </div>

    <div class="modal-body">
      <!-- Photo -->
      <div class="photo-upload-area" id="photoUploadArea">
        <input type="file" id="photoInput" accept="image/*" hidden>
        <div class="photo-placeholder" id="photoPlaceholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>タップして写真を追加</span>
        </div>
        <img class="photo-preview" id="photoPreview" alt="プレビュー" hidden>
        <button class="photo-remove-btn" id="photoRemoveBtn" hidden aria-label="写真を削除">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Form Fields -->
      <div class="form-fields">
        <div class="form-group">
          <label class="form-label" for="nameInput">銘柄 <span class="required">*</span></label>
          <input class="form-input" type="text" id="nameInput" placeholder="例: 山崎 12年">
        </div>

        <div class="form-group">
          <label class="form-label" for="distilleryInput">蒸留所</label>
          <input class="form-input" type="text" id="distilleryInput" placeholder="例: サントリー山崎蒸溜所">
        </div>

        <div class="form-group">
          <label class="form-label">評価</label>
          <div class="star-rating" id="starRating" role="group" aria-label="評価">
            <button class="star" data-value="1" aria-label="1星">★</button>
            <button class="star" data-value="2" aria-label="2星">★</button>
            <button class="star" data-value="3" aria-label="3星">★</button>
            <button class="star" data-value="4" aria-label="4星">★</button>
            <button class="star" data-value="5" aria-label="5星">★</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">香り</label>
          <div class="tag-list" id="aromaTagList"></div>
        </div>

        <div class="form-group">
          <label class="form-label">味わい</label>
          <div class="tag-list" id="flavorTagList"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="commentInput">コメント</label>
          <textarea class="form-textarea" id="commentInput" rows="4" placeholder="その他メモ…"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="detail-modal" id="detailModal" role="dialog" aria-modal="true">
    <div class="detail-header">
      <button class="btn-icon detail-close" id="detailCloseBtn" aria-label="閉じる">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="detail-header-actions">
        <button class="btn-icon btn-danger" id="deleteBtn" aria-label="削除">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </button>
        <button class="btn-save" id="detailSaveBtn">保存</button>
      </div>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>

  <!-- Wikipedia Detail Modal -->
  <div class="detail-modal" id="wikiDetailModal" role="dialog" aria-modal="true">
    <div class="detail-header">
      <button class="btn-icon detail-close" id="wikiDetailCloseBtn" aria-label="閉じる">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="detail-header-actions">
        <button class="btn-save" id="wikiAddBtn">＋ コレクションに追加</button>
      </div>
    </div>
    <div class="detail-body" id="wikiDetailBody"></div>
  </div>

  <!-- Delete Confirm Dialog -->
  <div class="confirm-dialog" id="confirmDialog">
    <div class="confirm-content">
      <h3>削除しますか？</h3>
      <p>この記録を削除します。この操作は取り消せません。</p>
      <div class="confirm-actions">
        <button class="btn-cancel" id="confirmCancelBtn">キャンセル</button>
        <button class="btn-delete" id="confirmDeleteBtn">削除する</button>
      </div>
    </div>
  </div>

  <script src="whisky-db.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
