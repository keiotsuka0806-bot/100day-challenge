<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>VinRoute B路線 — 道・マスも磁器化</title>
<style>
  body{margin:0;font-family:"Hiragino Maru Gothic ProN",sans-serif;background:#6fb9e2}
  h1{color:#fff;text-align:center;font-size:19px;padding:12px 0 2px}
  p.note{color:#eaf6ff;text-align:center;font-size:12px;margin:4px 0 10px}
  .map{position:relative;max-width:1060px;height:640px;margin:0 auto 26px;border-radius:20px;overflow:hidden;
    background:
      radial-gradient(ellipse 600px 300px at 20% 15%, #b9dc92 0%, transparent 60%),
      radial-gradient(ellipse 500px 350px at 85% 70%, #9ccb74 0%, transparent 65%),
      linear-gradient(160deg,#a8d47f,#8bc46a 55%,#b0c883);
    box-shadow:0 12px 34px rgba(0,0,0,.3)}
  .sea{position:absolute;left:-40px;top:-60px;width:280px;height:780px;background:linear-gradient(100deg,#7fc4e8 75%,transparent);
    border-radius:0 50% 50% 0/0 40% 45% 0}
  .road{position:absolute;background-image:url(road_tile.png);background-size:72px 72px;
    box-shadow:inset 0 0 6px rgba(120,90,40,.55), 0 3px 6px rgba(0,0,0,.18)}
  .road.h{height:26px;border-radius:13px}
  .road.v{width:26px;border-radius:13px}
  img.cell{position:absolute;width:40px;height:40px;filter:drop-shadow(0 3px 3px rgba(0,0,0,.25))}
  img.cell.y{filter:hue-rotate(-70deg) saturate(1.5) drop-shadow(0 3px 3px rgba(0,0,0,.25))}
  img.cell.b{filter:hue-rotate(120deg) drop-shadow(0 3px 3px rgba(0,0,0,.25))}
  img.cell.p{filter:hue-rotate(170deg) saturate(1.3) drop-shadow(0 3px 3px rgba(0,0,0,.25))}
  img.cell.c{filter:hue-rotate(80deg) drop-shadow(0 3px 3px rgba(0,0,0,.25))}
  img.cell.r{filter:hue-rotate(240deg) saturate(1.6) drop-shadow(0 3px 3px rgba(0,0,0,.25))}
  img.node{position:absolute;width:64px;height:64px;filter:drop-shadow(0 4px 5px rgba(0,0,0,.3))}
  img.spr{position:absolute;filter:drop-shadow(0 7px 7px rgba(0,0,0,.28))}
  .tag{position:absolute;background:rgba(255,255,255,.93);border-radius:10px;padding:2px 11px;font-size:12px;font-weight:800;color:#3a2a22;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  .gold{color:#8a6a1a}
</style>
</head>

</div>
</body>
</html>
