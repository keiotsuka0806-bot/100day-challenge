<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>VinRoute B路線世界観（磁器×金）</title>
<style>
  body{margin:0;font-family:"Hiragino Maru Gothic ProN",sans-serif;background:#6fb9e2}
  h1{color:#fff;text-align:center;font-size:19px;padding:12px 0 2px}
  p.note{color:#eaf6ff;text-align:center;font-size:12px;margin:4px 0 10px}
  .map{position:relative;max-width:1060px;height:640px;margin:0 auto 26px;border-radius:20px;overflow:hidden;
    background:
      radial-gradient(ellipse 600px 300px at 20% 15%, #b9dc92 0%, transparent 60%),
      radial-gradient(ellipse 500px 350px at 85% 70%, #9ccb74 0%, transparent 65%),
      linear-gradient(160deg,#a8d47f,#8bc46a 55%,#b0c883);
    box-shadow:0 12px 34px rgba(0,0,0,.3)}
  .sea{position:absolute;left:-40px;top:-60px;width:280px;height:780px;background:linear-gradient(100deg,#7fc4e8 75%,transparent);
    border-radius:0 50% 50% 0/0 40% 45% 0}
  .road{position:absolute;background:#ecdcb4;box-shadow:inset 0 0 0 3px #c9a86a}
  .road.h{height:24px;border-radius:12px}
  .road.v{width:24px;border-radius:12px}
  .cell{position:absolute;width:30px;height:30px;border:3px solid #fff;border-radius:6px;box-shadow:0 3px 4px rgba(0,0,0,.22)}
  .node{position:absolute;width:52px;height:52px;border-radius:50%;border:3px solid #fff;box-shadow:0 4px 8px rgba(0,0,0,.28);
    display:flex;align-items:center;justify-content:center;font-size:22px}
  img{position:absolute;filter:drop-shadow(0 7px 7px rgba(0,0,0,.28))}
  .tag{position:absolute;background:rgba(255,255,255,.93);border-radius:10px;padding:2px 11px;font-size:12px;font-weight:800;color:#3a2a22;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  .gold{color:#8a6a1a}
</style>
</head>

<div class="map">
  <div class="sea"></div>

  <span class="tag gold" style="left:585px;top:238px">▶ あなた</span>
</div>
</body>
</html>
