<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>VinRoute コンセプト確認（どうぶつの森×シリコン）</title>
<style>
  body{margin:0;font-family:"Hiragino Maru Gothic ProN",sans-serif;background:#7fc4e8}
  h1{color:#fff;text-align:center;font-size:20px;padding:14px 0 0}
  .map{position:relative;max-width:1000px;height:560px;margin:16px auto;border-radius:20px;overflow:hidden;
    background:linear-gradient(160deg,#a8d47f,#8bc46a 55%,#b7c887);box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .road{position:absolute;left:0;right:0;top:300px;height:26px;background:#ecdcb4;border-top:4px solid #c9a86a;border-bottom:4px solid #c9a86a}
  .cell{position:absolute;top:296px;width:34px;height:34px;border:3px solid #fff;border-radius:6px;box-shadow:0 3px 4px rgba(0,0,0,.2)}
  img{position:absolute;filter:drop-shadow(0 6px 6px rgba(0,0,0,.25))}
  .tag{position:absolute;background:rgba(255,255,255,.9);border-radius:10px;padding:2px 10px;font-size:12px;font-weight:700;color:#3a2a22}
  .row{display:flex;gap:14px;justify-content:center;padding:0 20px 30px;flex-wrap:wrap}
  .card{background:#fff;border-radius:14px;padding:10px;text-align:center;width:150px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
  .card img{position:static;width:120px;height:120px;filter:none}
  .card div{font-size:12px;font-weight:700;color:#3a2a22}
</style>
</head>
<body>
<h1>🍷 VinRoute 新スタイル確認 — マップに置いたイメージ</h1>
<div class="map">
  <div class="road"></div>
  <div class="cell" style="left:120px;background:#16c65a"></div>
  <div class="cell" style="left:260px;background:#ffc400"></div>
  <div class="cell" style="left:400px;background:#1f7bff"></div>
  <div class="cell" style="left:540px;background:#b026ff"></div>
  <div class="cell" style="left:680px;background:#00d0e0"></div>
  <img src="tree.png"   style="left:40px;  top:150px; width:120px">
  <img src="tree.png"   style="left:840px; top:120px; width:90px">
  <img src="tree.png"   style="left:640px; top:360px; width:150px">
  <img src="house.png"  style="left:180px; top:130px; width:140px">
  <img src="eiffel.png" style="left:430px; top:60px;  width:190px">
  <img src="barrel.png" style="left:760px; top:200px; width:110px">
  <img src="character.png" style="left:310px; top:210px; width:120px">
  <span class="tag" style="left:470px;top:270px">パリ</span>
  <span class="tag" style="left:200px;top:280px">シャンパーニュ</span>
  <span class="tag" style="left:770px;top:320px">コニャック</span>
</div>
<div class="row">
  <div class="card"><img src="tree.png"><div>木</div></div>
  <div class="card"><img src="house.png"><div>コロンバージュの家</div></div>
  <div class="card"><img src="eiffel.png"><div>エッフェル塔</div></div>
  <div class="card"><img src="barrel.png"><div>ワイン樽＋ぶどう</div></div>
  <div class="card"><img src="character.png"><div>ソムリエっ子（キャラ案）</div></div>
</div>
</body>
</html>
