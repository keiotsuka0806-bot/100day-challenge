<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>VinRoute — あつ森統一世界観</title>
<style>
  body{margin:0;font-family:"Hiragino Maru Gothic ProN",sans-serif;background:#3d9bc9}
  h1{color:#fff;text-align:center;font-size:19px;padding:12px 0 2px}
  p.note{color:#e0f4ff;text-align:center;font-size:12px;margin:4px 0 10px}
  .world{position:relative;max-width:1060px;height:660px;margin:0 auto 26px;border-radius:20px;overflow:hidden;
    background-image:url(sea_tex2.png);background-size:380px;box-shadow:0 12px 34px rgba(0,0,0,.3)}
  .land{position:absolute;left:150px;top:-80px;width:1000px;height:800px;
    background-image:url(../concept4/grass_tex.png);background-size:340px;
    border-radius:42% 30% 38% 46%/40% 36% 42% 38%;
    box-shadow:0 0 0 12px rgba(246,232,193,.95), 0 0 0 20px rgba(255,255,255,.5), inset 0 0 60px rgba(60,120,40,.15)}
  .road{position:absolute;background-image:url(../concept3/road_tile.png);background-size:66px 66px;
    box-shadow:inset 0 0 5px rgba(120,90,40,.5), 0 3px 6px rgba(0,0,0,.16)}
  .road.h{height:26px;border-radius:13px}
  .road.v{width:26px;border-radius:13px}
  img.cell{position:absolute;width:36px;height:36px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
  img.cell.y{filter:hue-rotate(-65deg) saturate(1.6) drop-shadow(0 1px 2px rgba(0,0,0,.3))}
  img.cell.p{filter:hue-rotate(155deg) saturate(1.3) drop-shadow(0 1px 2px rgba(0,0,0,.3))}
  img.cell.c{filter:hue-rotate(60deg) drop-shadow(0 1px 2px rgba(0,0,0,.3))}
  img.cell.r{filter:hue-rotate(230deg) saturate(1.5) drop-shadow(0 1px 2px rgba(0,0,0,.3))}
  img.plaza{position:absolute;width:72px;height:72px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.28))}
  img.spr{position:absolute;filter:drop-shadow(0 6px 6px rgba(0,0,0,.24))}
  .tag{position:absolute;background:rgba(255,255,255,.93);border-radius:10px;padding:2px 11px;font-size:12px;font-weight:800;color:#3a2a22;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  .gold{color:#8a6a1a}
</style>
</head>

</html>
