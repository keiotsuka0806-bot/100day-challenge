<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><title>素材くらべ：A サテンビニール vs B 磁器</title>
<style>
 body{margin:0;font-family:"Hiragino Maru Gothic ProN",sans-serif;background:#7fc4e8}
 h1{color:#fff;text-align:center;font-size:19px;padding:14px 0 4px}
 h2{color:#fff;text-align:center;font-size:14px;margin:6px 0}
 .map{position:relative;max-width:960px;height:400px;margin:10px auto;border-radius:18px;overflow:hidden;
   background:linear-gradient(160deg,#a8d47f,#8bc46a 55%,#b7c887);box-shadow:0 8px 24px rgba(0,0,0,.25)}
 .half{position:absolute;top:0;bottom:0;width:50%}
 .half.b{left:50%;border-left:3px dashed rgba(255,255,255,.7)}
 .lbl{position:absolute;top:10px;left:14px;background:rgba(255,255,255,.92);border-radius:10px;padding:3px 12px;font-weight:800;font-size:13px;color:#3a2a22}
 img{position:absolute;filter:drop-shadow(0 6px 6px rgba(0,0,0,.25))}
 .curioRow{display:flex;gap:16px;justify-content:center;align-items:flex-end;padding:6px 0 26px}
 .card{background:#fff;border-radius:14px;padding:10px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.2)}
 .card img{position:static;filter:none}
 .card div{font-size:12px;font-weight:700;color:#3a2a22;margin-top:4px}
</style></head><body>
<h1>🍷 素材くらべ — A：サテンビニール（デザイナーズトイ） vs B：磁器（ポーセリン×金）</h1>
<div class="map">
  <div class="half a"><span class="lbl">A サテンビニール</span></div>
  <div class="half b"><span class="lbl" style="left:auto;right:14px">B 磁器×金</span></div>
  <img src="treeA.png"   style="left:60px;  top:120px; width:150px">
  <img src="eiffelA.png" style="left:250px; top:60px;  width:210px">
  <img src="treeB.png"   style="left:530px; top:120px; width:150px">
  <img src="eiffelB.png" style="left:710px; top:60px;  width:210px">
</div>
<h2>キャラ：Curio参照（ソムリエ版）＋ 原作Curio</h2>
<div class="curioRow">
  <div class="card"><img src="curio-sommelier.png" width="230"><div>Curioソムリエ版（新規生成）</div></div>
  <div class="card"><img src="../../../../../chibi-maker/for-meshy/curio_apose.png" width="170"><div>原作Curio（参照元）</div></div>
</div>
</body></html>
