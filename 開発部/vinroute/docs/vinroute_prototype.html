<meta charset="utf-8">
<style>
  :root{
    --vine:#3f7d4e; --earth:#c98a5e; --wine:#7a1f3d; --gold:#e3b23c;
    --cream:#f6efe2; --ink:#3a2a22;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;color:var(--ink);background:#1d2b22;overflow:hidden}
  #app{position:relative;width:100%;height:100vh}

  /* アバター選択 */
  #select{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 25%, #2f5740, #1d2b22 70%);gap:16px;padding:24px;text-align:center;overflow:auto}
  #select h1{font-size:34px;margin:0;letter-spacing:.04em;color:var(--cream)}
  #select h1 .v{color:var(--gold)}
  #select p{margin:0;color:#cdbfa6;font-size:14px}
  .avatars{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:720px;margin-top:6px}
  .av{width:128px;background:var(--cream);border:3px solid transparent;border-radius:16px;padding:10px 8px;cursor:pointer;
    transition:transform .12s, border-color .12s, box-shadow .12s;box-shadow:0 6px 0 rgba(0,0,0,.25)}
  .av:hover{transform:translateY(-4px)}
  .av.sel{border-color:var(--gold);box-shadow:0 0 0 4px rgba(227,178,60,.3),0 6px 0 rgba(0,0,0,.25)}
  .av.taken{opacity:.4;cursor:not-allowed;filter:grayscale(.7)}
  .av svg{display:block;margin:0 auto}
  .av .nm{font-weight:700;font-size:13px;margin-top:4px}
  .av .ds{font-size:10.5px;color:#8a7763;line-height:1.3;margin-top:2px}
  .namebox{margin-top:4px}
  .namebox input{padding:9px 12px;border-radius:10px;border:2px solid #b9a986;font-size:15px;width:220px;background:var(--cream)}
  .go{margin-top:4px;background:var(--wine);color:#fff;border:none;padding:13px 30px;border-radius:12px;font-size:16px;font-weight:700;
    cursor:pointer;box-shadow:0 5px 0 #561328;transition:transform .08s}
  .go:hover{transform:translateY(-2px)}
  .go:active{transform:translateY(3px);box-shadow:0 2px 0 #561328}
  .go:disabled{opacity:.45;cursor:not-allowed}

  /* ゲーム */
  #game{position:relative;width:100%;height:100vh;display:none}
  canvas{display:block;width:100%;height:100%}
  .hud{position:absolute;left:14px;top:14px;display:flex;flex-direction:column;gap:6px;font-size:13px;max-width:260px}
  .chips{display:flex;flex-direction:column;gap:4px}
  .pchip{display:flex;align-items:center;flex-wrap:wrap;gap:6px;background:rgba(246,239,226,.92);border-radius:9px;padding:4px 9px;box-shadow:0 2px 8px rgba(0,0,0,.22);border:2px solid transparent;font-size:12px}
  .pchip.active{border-color:var(--gold);background:#fff}
  .pchip .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .pchip .pn{font-weight:700;color:#3a2a22;white-space:nowrap}
  .pchip .pn small{font-size:9px;color:#8a7763;margin-left:2px}
  .pchip .pv{font-weight:800;color:var(--wine);margin-left:auto}
  .pchip .pv::before{content:"★";font-size:10px;color:var(--gold);margin-right:2px}
  .pchip .pres{width:100%;font-size:12px;letter-spacing:.5px;color:#5e4d3e;margin-top:2px}
  .pcard{background:rgba(246,239,226,.94);border-radius:14px;padding:9px 13px;box-shadow:0 4px 14px rgba(0,0,0,.3);border:3px solid transparent;min-width:160px;transition:border-color .2s,transform .2s}
  .pcard.active{border-color:var(--gold);transform:scale(1.03)}
  .pcard .who{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px}
  .pcard .dot{width:12px;height:12px;border-radius:50%}
  .pcard .row{margin-top:4px;color:#5e4d3e}
  .pcard .res{margin-top:3px;font-size:14px;letter-spacing:1px}
  .pcard .turn{font-size:11px;color:var(--wine);font-weight:700;margin-top:3px}
  .seasonBar{background:rgba(122,31,61,.92);color:var(--cream);border-radius:10px;padding:5px 11px;font-weight:700;font-size:13px;box-shadow:0 3px 10px rgba(0,0,0,.3)}
  .movesLeft{font-weight:800;font-size:14px;color:var(--wine);text-align:center;min-height:18px}
  .actionLog{position:absolute;right:14px;bottom:100px;width:210px;display:flex;flex-direction:column;gap:4px;pointer-events:none}
  .actionLog .le{background:rgba(246,239,226,.92);border-radius:8px;padding:6px 10px;font-size:12px;color:#3a2a22;box-shadow:0 2px 8px rgba(0,0,0,.2);animation:logIn .2s}
  @keyframes logIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
  /* モーダル共通 */
  .modal{position:absolute;inset:0;z-index:40;display:none;align-items:center;justify-content:center;background:rgba(20,14,10,.55);padding:20px}
  .modal>*,.bmTitle,.qzTitle,.rsTitle{max-width:340px}
  #buildModal,#quizModal,#resultModal{flex-direction:column;gap:0}
  .bmTitle,.qzTitle,.rsTitle{font-size:19px;font-weight:800;color:#3a2a22;background:var(--cream);padding:14px 18px;border-radius:14px 14px 0 0;width:300px;text-align:center}
  .bmRes{background:#efe6d4;color:#6a5843;font-size:14px;padding:6px;width:300px;text-align:center;letter-spacing:1px}
  .bmBtn{width:300px;background:var(--cream);border:none;border-top:1px solid #e2d5bd;padding:12px 16px;text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:2px}
  .bmBtn b{font-size:15px;color:#3a2a22}.bmBtn span{font-size:13px;color:var(--wine);font-weight:700}.bmBtn small{color:#8a7763;font-size:12px}
  .bmBtn:hover:not([disabled]){background:#fff}
  .bmBtn.done{opacity:.6}.bmBtn[disabled]{opacity:.4;cursor:not-allowed}
  .bmClose,.qzNext,.rsClose{width:300px;background:var(--gold);border:none;padding:13px;font-weight:800;font-size:15px;cursor:pointer;border-radius:0 0 14px 14px;color:#3a2a22}
  .bmWarp{width:300px;background:#7a1f3d;color:#fff;border:none;padding:12px 16px;font-weight:800;font-size:14px;cursor:pointer;border-top:1px solid #e2d5bd}
  .bmWarp:hover{filter:brightness(1.15)}
  .bmBtn.reinvest b{color:#2a6a3a}.bmBtn.reinvest{background:#eef7ef}
  .qzQ{background:var(--cream);padding:6px 18px 14px;width:300px;text-align:center;font-size:15px;color:#3a2a22}
  .qzOpt{width:300px;background:var(--cream);border:none;border-top:1px solid #e2d5bd;padding:13px 16px;text-align:left;cursor:pointer;font-size:15px;color:#3a2a22}
  .qzOpt:hover:not([disabled]){background:#fff}.qzOpt.ok{background:#bfe0c0;font-weight:700}.qzOpt.ng{background:#e8b4b0}
  .qzR{width:300px;padding:8px;text-align:center;font-weight:800}.qzR.ok{background:#bfe0c0;color:#2a6a3a}.qzR.ng{background:#e8b4b0;color:#7a2020}
  .qzExp{width:300px;background:var(--cream);padding:12px 18px;font-size:13px;color:#6a5843;line-height:1.5}
  .rsRow{width:300px;background:var(--cream);border-top:1px solid #e2d5bd;padding:11px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .rsRow.win{background:#f7ecc9}.rsRank{font-weight:800;color:var(--wine)}.rsName{font-weight:700;flex:1}.rsVal{font-weight:800}
  .rsRow small{width:100%;color:#8a7763;font-size:12px}
  /* シネマティックな結末 */
  #resultModal{background:rgba(10,6,4,.94)}
  .edStage{width:100%;max-width:400px;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .edFade{color:#f0e3c8;font-size:20px;font-weight:700;text-align:center;animation:edFadeIn 1.5s ease-out;padding:20px}
  @keyframes edFadeIn{0%{opacity:0}40%{opacity:1}100%{opacity:1}}
  .edSpot{text-align:center;color:#fff;animation:edPop .6s cubic-bezier(.2,1.4,.4,1);padding:20px}
  .edCrown{font-size:64px;animation:edBob 1.5s ease-in-out infinite}
  @keyframes edBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .edWinLabel{color:var(--gold);font-weight:800;font-size:16px;letter-spacing:3px;margin-top:8px}
  .edWinName{font-size:34px;font-weight:900;color:#fff;margin:6px 0;text-shadow:0 0 20px rgba(227,178,60,.8)}
  .edWinAssets{font-size:18px;color:#f0e3c8}.edWinAssets b{color:var(--gold);font-size:24px}
  .edWinDesc{margin-top:12px;color:#cbb89a;font-size:13px}
  @keyframes edPop{0%{opacity:0;transform:scale(.6)}100%{opacity:1;transform:scale(1)}}
  .edScroll{position:absolute;top:100%;width:100%;max-width:360px;text-align:center;color:#f0e3c8}
  @keyframes edRoll{0%{top:100%}100%{top:-180%}}
  .edBigTitle{font-size:22px;font-weight:900;color:var(--gold);margin-bottom:20px}
  .edSection{font-size:15px;font-weight:800;color:#e3b23c;margin:22px 0 10px;letter-spacing:2px}
  .edRankRow{background:rgba(246,239,226,.1);border-radius:10px;padding:10px;margin:6px 0;display:flex;flex-wrap:wrap;gap:4px 8px;align-items:center}
  .edRankRow.win{background:rgba(227,178,60,.25);border:1px solid var(--gold)}
  .edRk{font-weight:800;color:var(--gold)}.edNm{font-weight:700;color:#fff;flex:1;text-align:left}.edTot{font-weight:800;color:#f0e3c8}
  .edBrk{width:100%;font-size:11px;color:#a89a80;text-align:left}
  .edAward{background:rgba(246,239,226,.08);border-radius:8px;padding:9px;margin:5px 0;font-size:13px}
  .edAward span{color:#e3b23c;font-weight:700;margin-right:6px}.edAward b{color:#fff}
  .edMemo{color:#cbb89a;font-size:13px;line-height:2;margin:10px 0}
  .edThanks{font-size:18px;font-weight:800;color:var(--gold);margin:24px 0}
  .edScroll .rsClose{margin:20px auto 60px;max-width:200px;border-radius:10px}
  .edbCard{background:rgba(246,239,226,.1);border-radius:12px;padding:14px;margin:12px 0;text-align:left}
  .edbName{font-weight:800;font-size:16px;color:#fff;margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline}
  .edbTotal{font-size:13px;color:var(--gold);font-weight:800}
  .edbRow{display:flex;justify-content:space-between;font-size:12px;color:#e8dcc4;padding:3px 0}
  .edbRow.sub{color:#c9b896;padding-left:10px;font-size:11px}
  .edbRowHead{font-size:11px;color:#e3b23c;font-weight:700;margin-top:6px;border-top:1px solid rgba(227,178,60,.3);padding-top:5px}
  .edResults{text-align:center;color:#f0e3c8;animation:edFadeIn 1s ease-out}
  .edFinalList{margin:18px auto 4px;max-width:280px}
  .edFinalRow{display:flex;align-items:center;gap:8px;padding:7px 12px;margin:5px 0;background:rgba(246,239,226,.1);border-radius:9px;font-size:13px}
  .edFinalRow.win{background:rgba(227,178,60,.22);border:1px solid var(--gold)}
  .efMedal{font-size:15px;width:26px}
  .efName{flex:1;text-align:left;font-weight:700;color:#fff}
  .efTot{font-weight:800;color:var(--gold)}
  .edBtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
  .rsClose.alt{background:rgba(246,239,226,.2);color:#f0e3c8}
  .shareCard{background:linear-gradient(160deg,#4a1526,#7a1f3d);border:2px solid var(--gold);border-radius:20px;padding:24px 22px;width:330px;text-align:center;color:#fff;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  .scTitle{font-size:26px;font-weight:900;color:var(--gold);letter-spacing:1px}
  .scSub{font-size:11px;color:#e8cba8;margin:4px 0 16px}
  .scCrown{font-size:24px;font-weight:900;margin-top:6px;text-shadow:0 0 18px rgba(227,178,60,.7)}
  .scWinTotal{font-size:14px;color:var(--gold);font-weight:800;margin-bottom:14px}
  .scRows{text-align:left;margin:10px 0}
  .scRow{display:flex;align-items:center;gap:8px;padding:7px 10px;margin:4px 0;background:rgba(255,255,255,.08);border-radius:9px;font-size:12px}
  .scRow.win{background:rgba(227,178,60,.25);border:1px solid var(--gold)}
  .scMedal{font-size:15px;width:24px}
  .scName{flex:1;font-weight:700}
  .scTotal{font-weight:900;color:var(--gold)}
  .scFactor{font-size:10px;color:#d8c4a8;width:64px;text-align:right}
  .scFooter{font-size:10px;color:#cbb89a;margin-top:14px;border-top:1px solid rgba(227,178,60,.3);padding-top:10px}
  .scHint{font-size:11px;color:#cbb89a;margin-top:12px;text-align:center}
  /* 資源スロット */
  .slotBox{background:var(--cream);border-radius:18px;padding:22px 26px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.4);width:250px}
  .slotTitle{font-weight:800;font-size:18px;color:#3a2a22;margin-bottom:12px}
  .ppGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
  .ppBtn{background:var(--gold);border:none;border-radius:10px;padding:16px 0;font-size:22px;font-weight:900;color:#3a2a22;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  .ppBtn:hover{background:#f0c94a}
  .slotReel{font-size:64px;height:80px;line-height:80px;background:#fff;border-radius:12px;border:3px solid var(--gold);margin-bottom:14px}
  .slotStop{width:100%;background:var(--wine);color:#fff;border:none;padding:13px;font-weight:800;font-size:16px;border-radius:10px;cursor:pointer}
  .slotStop:hover{filter:brightness(1.1)}
  .slotHint{margin-top:10px;font-size:13px;color:#6a5843;font-weight:700}
  .mkBox{background:var(--cream);border-radius:18px;padding:22px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.4);width:270px}
  .mkTitle{font-weight:800;font-size:18px;color:#3a2a22;margin-bottom:6px}
  .mkRes{font-size:14px;color:#6a5843;margin-bottom:12px;letter-spacing:1px}
  .mkBtn{width:100%;background:#fff;border:2px solid #e2d5bd;border-radius:10px;padding:12px;margin:6px 0;font-weight:700;font-size:15px;color:#3a2a22;cursor:pointer;display:flex;justify-content:space-between}
  .mkBtn span{color:var(--wine)}.mkBtn:hover:not([disabled]){border-color:var(--gold)}.mkBtn[disabled]{opacity:.4;cursor:not-allowed}
  .mkClose{width:100%;background:var(--gold);border:none;border-radius:10px;padding:12px;margin-top:8px;font-weight:800;cursor:pointer;color:#3a2a22}
  .mkBtn.card{background:#f3ecfb;border-color:#c9a9e9}
  .mkCardDesc{font-size:12px;color:#8a7763;margin:2px 0 4px}
  .saleBox{background:var(--cream);border-radius:18px;padding:20px;width:320px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .saleTitle{font-weight:800;font-size:18px;color:#3a2a22;text-align:center}
  .saleSub{font-size:12px;color:#8a7763;text-align:center;margin:6px 0 8px}
  .saleStats{display:flex;justify-content:space-between;gap:6px;background:#efe6d4;border-radius:8px;padding:6px 10px;font-size:11px;color:#5e4d3e;font-weight:700;margin-bottom:8px;flex-wrap:wrap}
  .saleRow{display:flex;align-items:center;gap:8px;padding:8px;border-top:1px solid #e2d5bd;font-size:13px}
  .saleRow.sold{opacity:.6}
  .saleRow .sn{flex:1;color:#3a2a22;font-weight:600}
  .saleRow .sv{color:#8a7763;font-size:12px}
  .saleRow .sbtn{background:var(--gold);border:none;border-radius:8px;padding:6px 10px;font-weight:700;cursor:pointer;color:#3a2a22;font-size:12px}
  .saleRow .sdone{color:var(--wine);font-weight:700;font-size:12px}
  .saleClose{width:100%;margin-top:12px;background:var(--wine);color:#fff;border:none;border-radius:10px;padding:12px;font-weight:800;cursor:pointer}
  .cityBox{background:var(--cream);border-radius:18px;padding:20px;width:340px;max-height:80vh;overflow-y:auto;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .cityTitle{font-weight:800;font-size:18px;color:#3a2a22;text-align:center}
  .cityRes{font-size:13px;color:#6a5843;text-align:center;margin:4px 0 8px;font-weight:700}
  .citySec{font-weight:800;font-size:13px;color:var(--wine);margin:12px 0 6px;border-bottom:1px solid #e2d5bd;padding-bottom:3px}
  .cityEmpty{font-size:12px;color:#a89a80;padding:6px;text-align:center}
  .cityRow{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px}
  .cityRow .cn{flex:1;color:#3a2a22;font-weight:600}.cityRow .cn small{display:block;color:#8a7763;font-weight:400;font-size:10px}
  .cbtn{background:var(--gold);border:none;border-radius:7px;padding:6px 9px;font-weight:700;font-size:11px;cursor:pointer;color:#3a2a22;white-space:nowrap}
  .cbtn.list{background:#7a1f3d;color:#fff;margin-left:4px}
  .cbtn.buy{background:#2a6a3a;color:#fff}
  .cbtn:disabled{opacity:.4;cursor:not-allowed}
  .cbtns{display:flex}
  .cityClose{width:100%;margin-top:14px;background:var(--gold);color:#3a2a22;border:none;border-radius:10px;padding:12px;font-weight:800;cursor:pointer}
  .auctItem{font-size:17px;font-weight:800;color:#3a2a22;text-align:center;margin:14px 0 6px}
  .auctInfo{font-size:13px;color:var(--wine);text-align:center;font-weight:700;margin-bottom:8px}
  .auctYou{font-size:13px;color:#6a5843;text-align:center;margin:8px 0;font-weight:700}
  .bidBtn{width:100%;margin:6px 0;padding:12px;font-size:15px}
  /* 評論家 */
  .criticBox{background:var(--cream);border-radius:18px;padding:24px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.4);width:260px;animation:criticIn .3s}
  @keyframes criticIn{from{opacity:0;transform:scale(.8) translateY(20px)}to{opacity:1;transform:none}}
  .criticFace{font-size:64px;animation:criticBob 1s ease-in-out infinite}
  @keyframes criticBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .criticName{font-weight:800;color:#8e44ad;font-size:15px;margin:6px 0}
  .criticLine{background:#fff;border-radius:12px;padding:12px;font-size:15px;color:#3a2a22;font-style:italic;margin:10px 0}
  .criticEff{color:var(--wine);font-weight:800;font-size:15px;margin-bottom:14px}
  .criticOk{width:100%;background:#8e44ad;color:#fff;border:none;padding:12px;font-weight:800;font-size:15px;border-radius:10px;cursor:pointer}
  .criticBox.chaos{background:linear-gradient(160deg,#3a1020,#6a1030);animation:chaosShake .4s}
  .criticBox.chaos .criticName{color:#ff6b6b}.criticBox.chaos .criticLine{background:rgba(255,255,255,.12);color:#ffdede}
  .criticBox.dmg{width:280px}
  .criticVictim{font-size:13px;color:#8a7763;margin-top:4px}
  .criticBigMsg{font-size:20px;font-weight:800;color:var(--wine);background:#fff;border-radius:12px;padding:16px 12px;margin:10px 0 4px;line-height:1.35}
  .criticBox.chaos .criticBigMsg{background:rgba(255,255,255,.15);color:#ffe0e0}
  .criticBox.harmless .criticName{color:#2a6a3a}
  .criticBox.harmless .criticBigMsg{color:#2a6a3a}
  .criticSlotLine{background:#fff;border:3px solid #8e44ad;border-radius:12px;padding:14px 12px;font-size:16px;color:#3a2a22;font-style:italic;margin:10px 0;min-height:24px;line-height:24px}
  .criticSlotEff{color:var(--wine);font-weight:800;font-size:15px;margin-bottom:14px;min-height:18px}
  @keyframes chaosShake{0%,100%{transform:none}20%{transform:translateX(-8px) rotate(-1deg)}40%{transform:translateX(8px) rotate(1deg)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  /* ヴィンテージ発表 */
  .vtBox{background:linear-gradient(160deg,#fbf3e0,#f0e3c8);border-radius:20px;padding:26px;text-align:center;box-shadow:0 12px 36px rgba(0,0,0,.45);width:290px;animation:vtIn .4s}
  @keyframes vtIn{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:none}}
  .vtYear{font-size:34px;font-weight:900;color:var(--wine);letter-spacing:1px}
  .vtSub{font-size:13px;color:#8a7763;margin-bottom:16px}
  .vtGreat,.vtPoor{border-radius:12px;padding:12px;margin:8px 0;font-weight:700;font-size:15px;color:#3a2a22;display:flex;flex-direction:column;gap:3px}
  .vtGreat{background:#fdeec2;border:2px solid var(--gold)}
  .vtPoor{background:#dfe6ea;border:2px solid #9fb0bb}
  .vtGreat small,.vtPoor small{font-weight:600;font-size:11px;color:#6a5843}
  .vtOk{width:100%;margin-top:14px;background:var(--wine);color:#fff;border:none;padding:13px;font-weight:800;font-size:15px;border-radius:10px;cursor:pointer}
  /* カード */
  .cardBox{background:var(--cream);border-radius:18px;padding:22px;text-align:center;box-shadow:0 12px 34px rgba(0,0,0,.45);width:270px;animation:vtIn .35s}

<script>
/* ============ 2Dちびアバター：どう森風（2.5頭身・点目・丸み・親しみやすさ） ============ */
const PALETTE=[
 {id:0,name:"ロザリー",desc:"陽気なソムリエ",skin:"#fad2ad",hair:"#d65a4a",cloth:"#e8746b",accent:"#fff1d8",face:"sommelier"},
 {id:1,name:"ヴィクトル",desc:"無口な醸造家",skin:"#f0c098",hair:"#5a4334",cloth:"#5a86c2",accent:"#7a5a3c",face:"winemaker"},
 {id:2,name:"アメリ",desc:"若手バイヤー",skin:"#fbd9bd",hair:"#8aa4c8",cloth:"#5cb672",accent:"#37506b",face:"buyer"},
 {id:3,name:"バジル",desc:"放浪の評論家",skin:"#e6b088",hair:"#e2e2e2",cloth:"#7a6a90",accent:"#cda33f",face:"critic"},
 {id:4,name:"クレア",desc:"畑の管理人",skin:"#f7c79e",hair:"#e07b2e",cloth:"#b06fd6",accent:"#7a9ad0",face:"farmer"},
 {id:5,name:"ティモ",desc:"樽職人見習い",skin:"#eeb085",hair:"#6a5038",cloth:"#ea8c3e",accent:"#caa05a",face:"cooper"},
];
const OUT="#43342a"; // 柔らかい茶系アウトライン（黒より優しい＝可愛い）

// 髪（後ろ）
function hairBack(a){
 switch(a.face){
  case"sommelier": return `<path d="M20 34 q-6 30 4 44 q-4 -24 4 -42Z" fill="${a.hair}" stroke="${OUT}" stroke-width="2"/><path d="M60 34 q6 30 -4 44 q4 -24 -4 -42Z" fill="${a.hair}" stroke="${OUT}" stroke-width="2"/>`;
  case"farmer": return `<path d="M22 36 q-5 22 3 34 q-3 -20 2 -34Z" fill="${a.hair}" stroke="${OUT}" stroke-width="2"/><path d="M58 36 q5 22 -3 34 q3 -20 -2 -34Z" fill="${a.hair}" stroke="${OUT}" stroke-width="2"/>`;
  default: return ``;
 }
}
// 髪（前）
function hairFront(a){
 switch(a.face){
  case"sommelier": return `<path d="M19 36 q1 -22 21 -22 q20 0 21 22 q-7 -9 -21 -9 q-14 0 -21 9Z" fill="${a.hair}" stroke="${OUT}" stroke-width="2" stroke-linejoin="round"/>`;
  case"winemaker": return `<path d="M19 36 q-1 -23 21 -23 q22 0 21 23 q-4 -10 -9 -11 l-2 7 l-3 -7 l-2 7 l-3 -7 l-2 7 l-3 -7 q-7 1 -13 11Z" fill="${a.hair}" stroke="${OUT}" stroke-width="2" stroke-linejoin="round"/>`;
  case"buyer": return `<path d="M19 35 q0 -22 21 -22 q21 0 21 22 q-7 -10 -16 -10 q-3 6 -9 7 q-3 -1 -5 0 q-6 -1 -12 3Z" fill="${a.hair}" stroke="${OUT}" stroke-width="2" stroke-linejoin="round"/>`;
  case"critic": return `<path d="M19 33 q2 -20 21 -20 q19 0 21 20 q-10 -7 -21 -6 q-11 -1 -21 6Z" fill="${a.hair}" stroke="${OUT}" stroke-width="2" stroke-linejoin="round"/>`;
  case"farmer": return `<path d="M19 36 q0 -22 21 -22 q21 0 21 22 q-6 -10 -15 -10 l-3 6 l-3 -6 q-14 0 -21 10Z" fill="${a.hair}" stroke="${OUT}" stroke-width="2" stroke-linejoin="round"/>`;
  case"cooper": return `<path d="M19 37 q0 -24 21 -24 q21 0 21 24 q-7 -12 -21 -12 q-14 0 -21 12Z" fill="${a.hair}" stroke="${OUT}" stroke-width="2" stroke-linejoin="round"/>`;
 }
}
// 顔（点目＋小さい口＝どう森の可愛さの核）
function features(a){
 // 共通の点目（離れ気味・大きめの黒点・ハイライト）
 const eyes=`<ellipse cx="31" cy="40" rx="3.2" ry="4" fill="#3a2a22"/><circle cx="32.2" cy="38.6" r="1.1" fill="#fff"/>
  <ellipse cx="49" cy="40" rx="3.2" ry="4" fill="#3a2a22"/><circle cx="50.2" cy="38.6" r="1.1" fill="#fff"/>`;
 const blush=`<ellipse cx="24" cy="46" rx="3.6" ry="2.4" fill="#f5a89a" opacity=".75"/><ellipse cx="56" cy="46" rx="3.6" ry="2.4" fill="#f5a89a" opacity=".75"/>`;
 switch(a.face){
  case"sommelier": return `${eyes}${blush}<path d="M35 47 q5 5 10 0" stroke="${OUT}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
  case"winemaker": return `${eyes}<path d="M27 35 q4 -1.5 7 0 M46 35 q4 -1.5 7 0" stroke="${OUT}" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M37 48 h6" stroke="${OUT}" stroke-width="2" stroke-linecap="round"/><path d="M33 33 q-2 5 1 8 M47 33 q2 5 -1 8" stroke="${a.hair}" stroke-width="2.6" fill="none" stroke-linecap="round"/>`;
  case"buyer": return `<circle cx="31" cy="40" r="5.4" fill="#fff" stroke="${OUT}" stroke-width="1.8"/><circle cx="49" cy="40" r="5.4" fill="#fff" stroke="${OUT}" stroke-width="1.8"/><path d="M36.4 40 h7.2" stroke="${OUT}" stroke-width="1.8"/><ellipse cx="31" cy="40.4" rx="2.4" ry="3" fill="#3a2a22"/><ellipse cx="49" cy="40.4" rx="2.4" ry="3" fill="#3a2a22"/><path d="M34 48 q6 5 12 0" stroke="${OUT}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
  case"critic": return `<ellipse cx="31" cy="40" rx="3" ry="3.8" fill="#3a2a22"/><circle cx="49" cy="40" r="6" fill="rgba(255,255,255,.3)" stroke="${a.accent}" stroke-width="2"/><ellipse cx="49" cy="40" rx="3" ry="3.8" fill="#3a2a22"/><path d="M49 46 l2 7" stroke="${a.accent}" stroke-width="1.6"/><path d="M26 34 l8 2 M54 34 l-8 2" stroke="${OUT}" stroke-width="2" stroke-linecap="round"/><path d="M36 49 q5 -2 9 0" stroke="${OUT}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
  case"farmer": return `${eyes}<circle cx="26" cy="46" r="0.9" fill="#cf9266"/><circle cx="29" cy="48" r="0.9" fill="#cf9266"/><circle cx="51" cy="46" r="0.9" fill="#cf9266"/><circle cx="54" cy="48" r="0.9" fill="#cf9266"/><path d="M34 47 q6 6 12 0" stroke="${OUT}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
  case"cooper": return `${eyes}<path d="M27 35 q4 -1 7 1 M46 36 q4 -2 7 -1" stroke="${OUT}" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M34 47 q6 6 12 0 q-6 2 -12 0Z" fill="#fff" stroke="${OUT}" stroke-width="2" stroke-linejoin="round"/>`;
 }
}
// 帽子
function headwear(a){
 switch(a.face){
  case"farmer": return `<ellipse cx="40" cy="18" rx="27" ry="7.5" fill="#e6c873" stroke="${OUT}" stroke-width="2"/><path d="M26 16 q14 -12 28 0 q-2 -2 -14 -2 q-12 0 -14 2Z" fill="#ecd488" stroke="${OUT}" stroke-width="2"/><path d="M24 17 h32" stroke="#c2a24e" stroke-width="2.5"/>`;
  case"cooper": return `<path d="M18 22 q22 -11 44 0 l0 3 q-22 -7 -44 0Z" fill="#cf4436" stroke="${OUT}" stroke-width="2" stroke-linejoin="round"/>`;
  default: return ``;
 }
}
// 服＋手足（ちび体型：丸い胴・短い手足）
function bodyParts(a){
 // 脚（短い・靴つき）
 const legs=`<rect x="31" y="92" width="7" height="13" rx="3.5" fill="${a.skin}" stroke="${OUT}" stroke-width="2"/><rect x="42" y="92" width="7" height="13" rx="3.5" fill="${a.skin}" stroke="${OUT}" stroke-width="2"/>
  <ellipse cx="33" cy="106" rx="6" ry="3.5" fill="#5a4632" stroke="${OUT}" stroke-width="2"/><ellipse cx="47" cy="106" rx="6" ry="3.5" fill="#5a4632" stroke="${OUT}" stroke-width="2"/>`;
 // 腕（短い・手は丸）
 const arms=`<rect x="17" y="74" width="7" height="16" rx="3.5" fill="${a.cloth}" stroke="${OUT}" stroke-width="2"/><circle cx="20.5" cy="91" r="4" fill="${a.skin}" stroke="${OUT}" stroke-width="2"/>
  <rect x="56" y="74" width="7" height="16" rx="3.5" fill="${a.cloth}" stroke="${OUT}" stroke-width="2"/><circle cx="59.5" cy="91" r="4" fill="${a.skin}" stroke="${OUT}" stroke-width="2"/>`;
 // 胴（丸い・ぷっくり）
 let torso=`<path d="M23 78 q0 -12 17 -12 q17 0 17 12 l1 18 q-18 6 -36 0Z" fill="${a.cloth}" stroke="${OUT}" stroke-width="2" stroke-linejoin="round"/>`;
 let ex="";
 switch(a.face){
  case"sommelier": ex=`<rect x="31" y="70" width="18" height="26" rx="4" fill="#3a3a3a" stroke="${OUT}" stroke-width="1.8"/><path d="M36 69 l4 3.5 l4 -3.5 l-1.5 5 h-5Z" fill="#7a1f3d" stroke="${OUT}" stroke-width="1.3"/>`; break;
  case"winemaker": ex=`<path d="M23 84 q17 6 34 0 l1 12 q-18 6 -36 0Z" fill="${a.accent}" stroke="${OUT}" stroke-width="1.8"/><rect x="31" y="66" width="3.5" height="18" fill="${a.accent}"/><rect x="45" y="66" width="3.5" height="18" fill="${a.accent}"/>`; break;
  case"buyer": ex=`<path d="M40 66 l-4 6 h8Z" fill="#fff" stroke="${OUT}" stroke-width="1.3"/><rect x="38.3" y="70" width="3.4" height="18" fill="${a.accent}"/>`; break;
  case"critic": ex=`<path d="M33 67 l7 9 l-5 0Z" fill="#5a4a6a" stroke="${OUT}" stroke-width="1.3"/><path d="M47 67 l-7 9 l5 0Z" fill="#5a4a6a" stroke="${OUT}" stroke-width="1.3"/><rect x="38" y="67" width="4" height="28" fill="#4a3a5a"/>`; break;
  case"farmer": ex=`<path d="M23 82 q17 6 34 0 l1 14 q-18 6 -36 0Z" fill="${a.accent}" stroke="${OUT}" stroke-width="1.8"/><rect x="31" y="66" width="3.5" height="17" fill="${a.accent}"/><rect x="45" y="66" width="3.5" height="17" fill="${a.accent}"/><rect x="34" y="85" width="12" height="7" rx="2" fill="#5a78ab" stroke="${OUT}" stroke-width="1.3"/>`; break;
  case"cooper": ex=`<path d="M32 70 h16 l-1.5 26 h-13Z" fill="#8a5a32" stroke="${OUT}" stroke-width="1.8"/><path d="M35 70 l5 -4 l5 4Z" fill="#6a4424" stroke="${OUT}" stroke-width="1.3"/>`; break;
 }
 return legs+arms+torso+ex;
}

// 全身ちびアバター（2.5頭身）
function avatarSVG(a,size=104){
 return `<svg width="${size*0.82}" height="${size}" viewBox="0 0 80 114">
  <ellipse cx="40" cy="110" rx="19" ry="3.5" fill="rgba(0,0,0,.12)"/>
  ${hairBack(a)}
  ${bodyParts(a)}
  <rect x="35" y="58" width="10" height="11" rx="4" fill="${a.skin}" stroke="${OUT}" stroke-width="2"/>
  <ellipse cx="40" cy="40" rx="24" ry="23" fill="${a.skin}" stroke="${OUT}" stroke-width="2.2"/>
  <path d="M18 41 q-3.5 0 -3.5 3.5 q0 3.5 3.5 3.5Z" fill="${a.skin}" stroke="${OUT}" stroke-width="1.8"/>
  <path d="M62 41 q3.5 0 3.5 3.5 q0 3.5 -3.5 3.5Z" fill="${a.skin}" stroke="${OUT}" stroke-width="1.8"/>
  ${hairFront(a)}
  ${features(a)}
  ${headwear(a)}
 </svg>`;
}

/* ステップ0: モード選択（一人で遊ぶ=NPC戦 / 友達と遊ぶ=人間のみ） */
let soloMode=false, numPlayers=2;

 soloMode=true;
 document.getElementById("modeSelect").style.display="none";

const KIND={
 bonus:{c:"#16c65a",s:"🃏",label:"カード",t:"🃏 カードマス",act:()=>{}},
 penalty:{c:"#ff2d2d",s:"🧐",label:"評論家",t:"🧐 評論家ダメージ",act:()=>{}},

};
const KIND_KEYS=["bonus","penalty","quiz","critic","weather","fund"];

/* ノード（マス）を構築：桃鉄式グリッドルート（格子にスナップ・縦横直線・重なりなし） */
let CELLS={}, cellArr=[];
const GRID=3.0; // 格子間隔（細かくして分岐増＆産地のズレ減）
function makeCell(id,x,y,type,payload){const c={id,x,y,type,payload,next:[]};CELLS[id]=c;cellArr.push(c);return c;}
function snap(v){return Math.round(v/GRID)*GRID;}
function gridKey(gx,gy){return `G_${Math.round(gx/GRID)}_${Math.round(gy/GRID)}`;}
function buildBoard(){
 CELLS={};cellArr.length=0;
 let seed=7;const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
 const regionCellId={};
 const occupied=new Set();
 for(const k in REGIONS){const r=REGIONS[k];
  let gx=snap(r.x), gy=snap(r.y);
  let tries=0;
  while(occupied.has(gridKey(gx,gy)) && tries<8){ gx+=GRID; tries++; }
  occupied.add(gridKey(gx,gy));
  const id="R_"+k; makeCell(id,gx,gy,"region",k); regionCellId[k]=id;
  REGIONS[k].x=gx; REGIONS[k].y=gy;
 }
 const gridCells={};
 for(const k in REGIONS){const id=regionCellId[k];const c=CELLS[id];gridCells[gridKey(c.x,c.y)]=id;}
 function getOrMakeGridCell(gx,gy){
  const key=gridKey(gx,gy);
  if(gridCells[key]) return gridCells[key];
  const kind=KIND_KEYS[Math.floor(rnd()*KIND_KEYS.length)];
  const id=`C_${Math.round(gx/GRID)}_${Math.round(gy/GRID)}`;
  makeCell(id,gx,gy,kind); gridCells[key]=id; return id;
 }
 // 産地間を階段状(複数の曲がり)で結ぶ → 交差点が増えて分岐が多くなる
 LINKS.forEach((lk)=>{
  const A=CELLS[regionCellId[lk.a]], B=CELLS[regionCellId[lk.b]];
  routeStaircase(A.x,A.y,B.x,B.y,getOrMakeGridCell,rnd);
 });
 // メッシュ化：既存マスの隣接格子にマスがあれば道でつなぐ（網の目＝分岐増）
 meshConnect(gridCells);
 ensureRegionConnectivity(regionCellId, gridCells);
}
/* 階段状ルート：横1歩・縦1歩を交互に繰り返してBへ。曲がりが増え交差点が生まれる */
function routeStaircase(ax,ay,bx,by,getCell,rnd){
 let gx=Math.round(ax/GRID), gy=Math.round(ay/GRID);
 const gbx=Math.round(bx/GRID), gby=Math.round(by/GRID);
 const ids=[getCell(gx*GRID,gy*GRID)];
 let guard=0;
 while((gx!==gbx||gy!==gby) && guard++<200){
  // 残り距離に応じて、横か縦をランダムに1歩（階段状）
  const dx=gbx-gx, dy=gby-gy;
  let moveX;
  if(dx===0) moveX=false; else if(dy===0) moveX=true; else moveX=(rnd()<0.5);
  if(moveX) gx+=Math.sign(dx); else gy+=Math.sign(dy);
  ids.push(getCell(gx*GRID,gy*GRID));
 }
 for(let i=0;i<ids.length-1;i++){ if(ids[i]!==ids[i+1]) connect(CELLS[ids[i]],CELLS[ids[i+1]]); }
}
/* メッシュ接続：隣接する格子マス同士を確率的に道でつなぐ（分岐の網を作る） */
function meshConnect(gridCells){
 let seed=31;const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
 const keys=Object.keys(gridCells);
 // パス1：控えめに基本の網を作る（密集を避け 0.32）
 keys.forEach(key=>{
  const id=gridCells[key];const c=CELLS[id];
  const gx=Math.round(c.x/GRID), gy=Math.round(c.y/GRID);
  [[1,0],[0,1]].forEach(d=>{
   const nk=`G_${gx+d[0]}_${gy+d[1]}`;
   if(gridCells[nk] && rnd()<0.32){ connect(c, CELLS[gridCells[nk]]); }
  });
 });
 // パス2：分岐が少ない所（一本道）だけに分岐を1つ足す
 keys.forEach(key=>{
  const id=gridCells[key];const c=CELLS[id];
  if(c.next.length>=3) return;            // すでに分岐がある所は触らない
  if(c.next.length===2 && rnd()<0.5) return; // 一本道でも半分はそのまま（分岐を作りすぎない）
  const gx=Math.round(c.x/GRID), gy=Math.round(c.y/GRID);
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  for(const d of dirs){
   if(c.next.length>=3) break;
   const nk=`G_${gx+d[0]}_${gy+d[1]}`;
   const nid=gridCells[nk];
   if(nid && !c.next.includes(nid) && CELLS[nid].next.length<3){
    if(rnd()<0.5){ connect(c, CELLS[nid]); }
   }
  }
 });
 // パス3：分岐が過剰なマス（4方向以上）を、連結を壊さない範囲で間引く
 pruneOverBranched(rnd);
}
/* 4方向以上に分岐したマスから、余分な道を1本ずつ外す（連結が保たれる場合のみ） */
function pruneOverBranched(rnd){
 cellArr.forEach(c=>{
  while(c.next.length>=4){
   // 外す候補：相手も3本以上持っていて、外しても両者が孤立しない道
   let removed=false;
   const cand=c.next.slice().sort(()=>rnd()-0.5);
   for(const nid of cand){
    const n=CELLS[nid];
    if(n.next.length<=2) continue;        // 相手が細い道なら残す（連結維持）
    if(c.type==="region"||n.type==="region") continue; // 産地に直結する道は残す
    // 一旦外して連結を確認
    disconnect(c,n);
    if(stillConnected(c,n)){ removed=true; break; }
    else { connect(c,n); } // 切れるなら戻す
   }
   if(!removed) break; // これ以上安全に外せない
  }
 });
}
function disconnect(a,b){ a.next=a.next.filter(x=>x!==b.id); b.next=b.next.filter(x=>x!==a.id); }
/* aからbへ（外した後でも）到達できるか＝連結が保たれているか */
function stillConnected(a,b){
 const seen={[a.id]:1};const q=[a.id];
 while(q.length){ const id=q.shift(); if(id===b.id) return true; (CELLS[id].next||[]).forEach(n=>{if(!seen[n]){seen[n]=1;q.push(n);}}); }
 return false;
}
function connect(a,b){ if(!a||!b)return; if(!a.next.includes(b.id))a.next.push(b.id); if(!b.next.includes(a.id))b.next.push(a.id); }
/* 各産地マスが最低2方向につながるよう、足りなければ近くのマスへ道を足す（孤立解消） */
function ensureRegionConnectivity(regionCellId, gridCells){
 const MIN=2;
 for(const k in regionCellId){
  const c=CELLS[regionCellId[k]];
  if(k==="paris") continue;
  let guard=0;
  while(c.next.length<MIN && guard++<12){
   // 最も近い「まだ接続していない」マスを探してつなぐ
   let best=null,bd=Infinity;
   cellArr.forEach(o=>{
    if(o.id===c.id) return;
    if(c.next.includes(o.id)) return;
    const d=Math.hypot(o.x-c.x,o.y-c.y);
    if(d<bd){ bd=d; best=o; }
   });
   if(!best) break;
   connect(c,best);
  }
 }
}

/* 矢印の輪郭を作る（tip=先端, back=根元, (px,py)=垂直方向） */
function arrowShape(tipx,tipy,backx,backy,px,py,Wd,L,z){
 const headBaseX=tipx-(tipx-backx)*0.5, headBaseY=tipy-(tipy-backy)*0.5; // 矢じりの付け根
 const shaftW=Wd*0.4;
 ctx.beginPath();
 // 先端
 ctx.moveTo(tipx,tipy);
 // 矢じり右
 ctx.lineTo(headBaseX+px*Wd*0.5, headBaseY+py*Wd*0.5);
 ctx.lineTo(headBaseX+px*shaftW*0.5, headBaseY+py*shaftW*0.5);
 // 軸右→根元
 ctx.lineTo(backx+px*shaftW*0.5, backy+py*shaftW*0.5);
 ctx.lineTo(backx-px*shaftW*0.5, backy-py*shaftW*0.5);
 // 軸左→矢じり左
 ctx.lineTo(headBaseX-px*shaftW*0.5, headBaseY-py*shaftW*0.5);
 ctx.lineTo(headBaseX-px*Wd*0.5, headBaseY-py*Wd*0.5);
 ctx.closePath();
}

/* ===== 地理ヘルパー（標高・内外判定・座標変換） ===== */
// 点が多角形の内側か（ray casting）
function pointInPoly(x,y,poly){
 let inside=false;
 for(let i=0,j=poly.length-1;i<poly.length;j=i++){
  const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];
  if(((yi>y)!==(yj>y)) && (x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
 }
 return inside;
}
// 標高推定：アルプス(南東)・ピレネー(南)・ジュラ・中央高地を山がちに
function elevationAt(lat,lon){
 let e=0;
 e+=Math.max(0,1-Math.hypot(lat-45.3,lon-6.6)/3.2);   // アルプス
 e+=Math.max(0,1-Math.hypot(lat-42.8,lon-1.0)/2.8)*0.9;// ピレネー
 e+=Math.max(0,1-Math.hypot(lat-46.6,lon-6.0)/1.6)*0.7;// ジュラ
 e+=Math.max(0,1-Math.hypot(lat-45.0,lon-3.2)/2.4)*0.6;// 中央高地
 return Math.min(1,e);
}
function logic2ll(x,y){
 const lon=FR_BBOX.minLon+(x/100)*(FR_BBOX.maxLon-FR_BBOX.minLon);
 const lat=FR_BBOX.maxLat-(y/100)*(FR_BBOX.maxLat-FR_BBOX.minLat);
 return [lat,lon];
}

let terrainCanvas=null, TERR_RES=1600; // オフスクリーン解像度(論理100→1600px)

function smoothElev(gx,gy){ // 標高を少しぼかして滑らかに
 const[lat,lon]=logic2ll(gx,gy);return elevationAt(lat,lon);
}
/* 標高→陸の色（連続グラデ：低地の緑から高山の岩へ滑らかに補間） */
function landColorGrad(e){
 // 制御点
 const stops=[[0.00,[150,210,120]],[0.18,[168,205,110]],[0.36,[190,200,135]],
              [0.55,[196,178,128]],[0.72,[176,150,110]],[0.88,[200,188,168]],[1.0,[235,235,238]]];
 for(let i=0;i<stops.length-1;i++){if(e<=stops[i+1][0]){const t=(e-stops[i][0])/(stops[i+1][0]-stops[i][0]);
  const a=stops[i][1],b=stops[i+1][1];return `rgb(${a[0]+(b[0]-a[0])*t|0},${a[1]+(b[1]-a[1])*t|0},${a[2]+(b[2]-a[2])*t|0})`;}}
 return "rgb(235,235,238)";
}

 // 陸地クリップ
 c.save();
 c.beginPath();FRANCE.forEach((p,i)=>{const[x,y]=lc(p[0],p[1]);i?c.lineTo(x,y):c.moveTo(x,y);});c.closePath();

 c.fillStyle="#96d272";c.fill();c.clip();
 // 標高グラデ（滑らかに：細かいセル＋少し重ねてブレンド）
 const step=0.8;
 for(let gy=0;gy<=100;gy+=step){for(let gx=0;gx<=100;gx+=step){
  const e=smoothElev(gx,gy);const[x,y]=lc(gx,gy);
  c.fillStyle=landColorGrad(e);c.fillRect(x-1,y-1,step*L2C+2,step*L2C+2);
 }}
 // 等高線（標高に連動）
 const levels=[0.3,0.42,0.54,0.66,0.78];
 levels.forEach((lv,li)=>{
  c.strokeStyle=`rgba(95,75,50,${0.18+li*0.06})`;c.lineWidth=1.2;
  const st=0.9;

   const a=smoothElev(gx,gy),b=smoothElev(gx+st,gy),d=smoothElev(gx,gy+st),e2=smoothElev(gx+st,gy+st);
   const pts=[];const edge=(va,vb,xa,ya,xb,yb)=>{if((va<lv)!==(vb<lv)){const t=(lv-va)/(vb-va);pts.push([xa+(xb-xa)*t,ya+(yb-ya)*t]);}};
   edge(a,b,gx,gy,gx+st,gy);edge(b,e2,gx+st,gy,gx+st,gy+st);edge(e2,d,gx+st,gy+st,gx,gy+st);edge(d,a,gx,gy+st,gx,gy);
   if(pts.length>=2){const[x1,y1]=lc(pts[0][0],pts[0][1]);const[x2,y2]=lc(pts[1][0],pts[1][1]);c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();}
  }}
 });
 // 川
 c.strokeStyle="#8ec5e8";c.lineWidth=3.4;c.lineCap="round";c.lineJoin="round";
 const rivers=[[[58,50],[60,40],[55,32],[46,24],[38,18],[30,14]],[[58,60],[52,52],[46,44],[40,40],[30,40],[20,42]],
  [[62,58],[62,66],[64,74],[66,82],[72,88],[78,90]],[[40,92],[32,84],[26,76],[22,68],[16,62]]];
 rivers.forEach(rv=>{c.beginPath();rv.forEach((p,i)=>{const[x,y]=lc(p[0],p[1]);if(i===0)c.moveTo(x,y);else{const[px,py]=lc(rv[i-1][0],rv[i-1][1]);c.quadraticCurveTo((px+x)/2+(i%2?4:-4)*L2C,(py+y)/2,x,y);}});c.stroke();});
 // 地理に沿ったオブジェクト配置（山→木と岩、丘→森、平野→畑と集落、川沿い→集落）
 placeObjectsGeo(c,lc);
 c.restore();
 // 海岸線
 c.beginPath();FRANCE.forEach((p,i)=>{const[x,y]=lc(p[0],p[1]);i?c.lineTo(x,y):c.moveTo(x,y);});c.closePath();c.strokeStyle="#5f8f44";c.lineWidth=3;c.stroke();
 c.beginPath();CORSICA.forEach((p,i)=>{const[x,y]=lc(p[0],p[1]);i?c.lineTo(x,y):c.moveTo(x,y);});c.closePath();c.stroke();

/* 地理に沿ったオブジェクト配置：標高と川で種類と密度を決める */
function placeObjectsGeo(c,lc){
 let seed=99;const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
 const objs=[];
 const step=4.0; // 間隔を広げて疎に
 for(let gy=0;gy<100;gy+=step){for(let gx=0;gx<100;gx+=step){
  if(!pointInPoly(gx,gy,FRANCE)&&!pointInPoly(gx,gy,CORSICA))continue;
  const e=smoothElev(gx,gy);
  const jx=gx+(rnd()-0.5)*step*0.8, jy=gy+(rnd()-0.5)*step*0.8;
  const r=rnd();
  // ほとんどの区画は何も置かず、余白を残す（うるさくしない）
  let type=null;
  if(e>0.55){ if(r<0.30)type="mountainpeak"; }          // 高山はまばらに雪峰だけ
  else if(e>0.35){ if(r<0.22)type="tree"; }             // 山地はたまに木
  else { // 平野・丘陵はまばらに木/畑/集落
   if(r<0.10)type="tree"; else if(r<0.16)type="field"; else if(r<0.20)type="house";
  }
  if(type)objs.push({x:jx,y:jy,type,e,sd:Math.floor(r*9999)});
 }}
 objs.sort((a,b)=>a.y-b.y);
 objs.forEach(o=>{const[x,y]=lc(o.x,o.y);drawObjectC(c,o.type,x,y,o.sd);});
}
/* オフスクリーン用オブジェクト描画（キャッシュ解像度基準・固定サイズ） */
function drawObjectC(c,type,x,y,sd){

   c.fillStyle=["#f0e2c8","#e6d6bc","#dde0ea"][Math.floor(rnd()*3)];c.fillRect(x-w/2,y-hh/2,w,hh);
   c.strokeStyle="#9a8a6a";c.lineWidth=U*0.1;c.strokeRect(x-w/2,y-hh/2,w,hh);
   c.fillStyle=["#c0392b","#8a4a3a","#5a6a8a"][Math.floor(rnd()*3)];c.beginPath();c.moveTo(x-w/2-U*0.2,y-hh/2);c.lineTo(x,y-hh/2-hh*0.55);c.lineTo(x+w/2+U*0.2,y-hh/2);c.closePath();c.fill();break;}
  case"field":{const w=3.4*U,hh=2.4*U;c.save();c.translate(x,y);c.rotate((rnd()-0.5)*0.4);
   c.fillStyle=rnd()<0.5?"#dcc96a":"#c9da74";c.fillRect(-w/2,-hh/2,w,hh);
   c.strokeStyle="rgba(140,120,60,.4)";c.lineWidth=U*0.08;for(let i=1;i<5;i++){const lx=-w/2+(i/5)*w;c.beginPath();c.moveTo(lx,-hh/2);c.lineTo(lx,hh/2);c.stroke();}c.restore();break;}
  case"rock":{const r=1.2*U;c.fillStyle="#9a9286";c.beginPath();c.moveTo(x-r,y+r*0.5);c.lineTo(x-r*0.3,y-r);c.lineTo(x+r*0.6,y-r*0.4);c.lineTo(x+r,y+r*0.5);c.closePath();c.fill();

/* 手詰まり検出：人間の手番なのにフラグが固まって振れない状態を、クリックで復帰させる */
function tryRecoverStuck(){
 if(curP().isNpc) return false;
 const stuck = rolling||moving||awaitingPick||movesLeft>0;
 if(!stuck) return false;
 if(anyModalOpen()){
  // モーダルが開いているのにフラグも固まっている → 取り残されたモーダルの可能性。
  // 2回目のクリックで強制的に閉じてリセット（保険）
  if(_recoverArmed){ closeAllModals(); rolling=false; moving=false; awaitingPick=false; pickOptions=[]; movesLeft=0; _recoverArmed=false; toast("↻ 進行を再開しました"); return true; }
  _recoverArmed=true; toast("固まっていたら もう一度サイコロを押してください");
  return true; // 一旦待つ
 }
 // モーダルが無いのに振れない → フラグをリセット
 rolling=false; moving=false; awaitingPick=false; pickOptions=[];
 const ph=document.getElementById("pickHint"); if(ph)ph.classList.remove("show");
 if(movesLeft>0){ movesLeft=0; }
 toast("↻ 進行を再開しました");
 return true;
}
let _recoverArmed=false;
function closeAllModals(){
 ["buildModal","criticModal","vintageModal","marketModal","fundModal","saleModal","cityModal","cardModal","quizModal"].forEach(id=>{ const m=document.getElementById(id); if(m)m.style.display="none"; });
}
function roll(){
 // 固まっていたら復帰を試みる（人間のみ）
 if((rolling||moving||awaitingPick||movesLeft>0)){
  if(!curP().isNpc){ tryRecoverStuck(); }
  if(rolling||moving||awaitingPick||movesLeft>0) return;
 }
 _recoverArmed=false;
 if(!curP().isNpc && rollBtn.disabled){ rollBtn.disabled=false; }
 if(overview)setOverview(false);
 recenter();
 // ぴったりカード：好きな目を選ぶ（人間）。NPCは目的地に近づく目を自動選択
 if(pinpointNext){
  pinpointNext=false;
  if(curP().isNpc){ startMoveWith(3+Math.floor(Math.random()*4)); return; }  // NPCは3〜6
  showPinpointPicker();
  return;

/* ===== ドラッグでパン＋クリックで分岐選択 ===== */
let dragging=false, dragMoved=false, dragStart={x:0,y:0}, camStart={x:0,y:0};
cv.addEventListener("pointerdown",ev=>{
 dragging=true; dragMoved=false;
 dragStart={x:ev.clientX,y:ev.clientY}; camStart={x:cam.x,y:cam.y};
 cv.setPointerCapture(ev.pointerId);
});
cv.addEventListener("pointermove",ev=>{
 if(!dragging)return;
 const dx=ev.clientX-dragStart.x, dy=ev.clientY-dragStart.y;
 if(Math.abs(dx)>4||Math.abs(dy)>4) dragMoved=true;
 if(dragMoved){
  userPanned=true;
  const s=BASE()*cam.zoom;
  cam.x=camStart.x-dx/s; cam.y=camStart.y-dy/s;
  cam.tx=cam.x; cam.ty=cam.y;
 }
});
cv.addEventListener("pointerup",ev=>{
 if(!dragging)return; dragging=false;
 const r=cv.getBoundingClientRect();const mx=ev.clientX-r.left,my=ev.clientY-r.top;
 if(!dragMoved && awaitingPick){
  const hit=16*cam.zoom;
  for(const id of pickOptions){const c=CELLS[id];const[x,y]=P(c.x,c.y);if(Math.hypot(mx-x,my-y)<hit){
   pickChoice(id);return;}}
 }
});

/* 手動パンをリセットして現在プレイヤーに戻る（ロール時・ターン交代時に呼ぶ） */
function recenter(){ userPanned=false; panX=0; panY=0; }

}

/* ===== 矢印キーで分岐選択（PC版） ===== */
window.addEventListener("keydown",ev=>{
 if(!awaitingPick||pickOptions.length===0)return;
 const dirs={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
 if(!dirs[ev.key])return;
 ev.preventDefault();
 const p=curP();const from=CELLS[p.posCell];const[d0,d1]=dirs[ev.key];
 // 進行方向に最も合致する候補を選ぶ
 let best=null,bestScore=-Infinity;
 for(const id of pickOptions){const c=CELLS[id];
  const vx=c.x-from.x, vy=c.y-from.y; const len=Math.hypot(vx,vy)||1;
  const score=(vx/len)*d0+(vy/len)*d1;
  if(score>bestScore){bestScore=score;best=id;}
 }
 if(best!==null) pickChoice(best);
});

/* シーズン終了：各プレイヤーの資産が資源とワインを産出。完了後 onComplete */
function endSeason(onComplete){
 const newWinesByPlayer=[];
 players.forEach((p,pi)=>{
  if(!p.produced) p.produced={}; // 産地key -> Set of タイプ
  const newWines=[];
  for(const k in p.assets){
   const a=p.assets[k];
   if(a.vineyard) p.grapes+=CONFIG.produce.vineyardGrapes;
   if(a.winery_std){ // 量産ワイン：生産レベルぶん生産（ぶどう1/本）
    const lv=a.winery_std_lv||1;
    for(let n=0;n<lv;n++){ if(p.grapes>=1){ p.grapes-=1; const v=CONFIG.produce.stdWineValue;
     const w={type:'std',region:k,value:v}; p.wines.push(w); p.value+=v; newWines.push(w);
     recordProduced(p,k,REGION_TYPE[k]); } }
   }
   if(a.winery_prem){ // プレミアム：評価（パーカーポイント）で価値が変動。生産レベルぶん生産
    a.rating=computeRating(p,k,a);
    const mult=vintageMultiplier(k);
    const ratingMult=ratingToMult(a.rating);
    const baseV=Math.round(CONFIG.produce.premWineValue*mult); // 評価100点想定(＝等倍)の基準値
    const v=Math.round(CONFIG.produce.premWineValue*mult*ratingMult);
    const lv=a.winery_prem_lv||1;
    for(let n=0;n<lv;n++){
     const w={type:'prem',region:k,vintage:seasonYear(),value:v,rating:a.rating};
     p.wines.push(w); p.value+=v; newWines.push(w);
     p.parkerDelta += (v-baseV); // パーカーポイントによる基準比の変動を累計
    }
    recordProduced(p,k,REGION_TYPE[k]);
    for(const st in TYPE_SETS){ if(st!==REGION_TYPE[k] && TYPE_SETS[st].includes(k)){ recordProduced(p,k,st); } }
   }
  }
  checkSets(p); // 生産後にセット判定
  newWinesByPlayer[pi]=newWines;
 });
 season++; turnInSeason=0;
 if(season<=CONFIG.totalSeasons){ rollVintage(); maybeBigCritic(); }
 // 売る/持つの選択（人間プレイヤーのみモーダル。NPCは自動）→ 完了後にヴィンテージ発表→onComplete
 handleWineSales(newWinesByPlayer, ()=>{
  if(season<=CONFIG.totalSeasons){ announceVintage(); }
  if(onComplete) onComplete();
 });
}
/* 売値：保有価値の70%で即現金化（持てば総資産に満額、売れば即資金だが割引） */

/* 各プレイヤーの新ワインについて売る/持つを決める */
function handleWineSales(newWinesByPlayer, done){
 // NPCは自動判断：量産ワインは売って資金化、プレミアムは持つ（コレクション）
 players.forEach((p,pi)=>{

  (newWinesByPlayer[pi]||[]).forEach(w=>{ if(w.type==='std' && Math.random()<0.6){ sellWine(p,w); } });
 });
 // 人間プレイヤーを順に処理

/* ワインを売る：保有から外し、価値を引いて資金を得る */
function sellWine(p,w){

 p.wines.splice(idx,1); p.value-=w.value; const price=sellPrice(w); p.money+=price;

/* ===== プレイヤー間ワイン市場（都市で売買） ===== */

function listWine(p,pIdx,w){

 p.wines.splice(idx,1); p.value-=w.value;

/* 都市の市場を開く：自分のワインを売る／出品する＋他人の出品を買う */

  });

  html+=`<div class="citySec">🍷 自分のワイン（売る・出品）</div>`;
  if(p.wines.length===0){ html+=`<div class="cityEmpty">売れるワインがありません</div>`; }
  else p.wines.forEach((w,i)=>{

  modal.querySelectorAll(".cbtn[data-auction]").forEach(b=>b.onclick=()=>{ startAuction(p,pIdx,p.wines[+b.dataset.auction],()=>render()); });

 };

}
/* ===== オークション：出品した瞬間、全員が入札。最高額で落札 ===== */
function startAuction(seller,sellerIdx,w,onDone){
 if(!w) return;
 const startPrice=Math.round(w.value*0.9);
 // 参加者：出品者以外の全員
 const bidders=players.map((p,i)=>({p,i})).filter(e=>e.i!==sellerIdx);
 let highBid=startPrice-1;   // まだ誰も入札していない状態（開始価格で最初の入札が入る）
 let highBidder=-1;
 let firstBid=true;
 // NPCが払ってよい上限（コレクション価値＋気まぐれ）
 const npcCap=(pl)=>{ let base=w.value*(0.8+Math.random()*0.5); if(w.type==='prem')base*=1.1; return Math.min(pl.money, Math.round(base)); };
 const order=bidders.slice();
 let idx=0, passesInARow=0;
 const modal=document.getElementById("cityModal");
 const nm=w.type==='prem'?`${w.vintage}年 ${REGIONS[w.region].name}（評価${w.rating||'-'}）`:`${REGIONS[w.region].name} 量産`;
 function finish(){
  if(highBidder>=0){
   const buyer=players[highBidder];
   buyer.money-=highBid; buyer.wines.push(w); buyer.value+=w.value;
   const si=seller.wines.indexOf(w); if(si>=0){ seller.wines.splice(si,1); seller.value-=w.value; }
   seller.money+=highBid;
   checkSets(buyer);  // 落札でコレクションが進むかも
   toast(`🔨 落札！ ${buyer.pname} が ${nm} を ${highBid} で獲得`);
  } else {
   toast(`🔨 入札なし。${nm} は手元に残った`);
  }
  renderHUD();
  modal.style.display="none";
  if(onDone) setTimeout(onDone,300);
 }
 function step(){
  // 全員が連続パス、または一巡して最高入札者以外が全員パスしたら終了
  if(passesInARow>=order.length){ finish(); return; }
  const {p,i}=order[idx%order.length]; idx++;
  // 既に自分が最高入札者ならパス
  if(i===highBidder){ passesInARow++; step(); return; }
  const nextBid = firstBid ? startPrice : highBid+Math.max(2,Math.round(w.value*0.1));
  if(p.isNpc){
   const cap=npcCap(p);
   if(cap>=nextBid && p.money>=nextBid){ highBid=nextBid; highBidder=i; firstBid=false; passesInARow=0; toast(`💬 ${p.pname} が ${nextBid} で入札`); }
   else { passesInARow++; }
   setTimeout(step,700);
  } else {
   // 人間：入札するかパスするか
   showBidPrompt(p,nm,nextBid,highBid,highBidder,(bid)=>{
    if(bid){ highBid=nextBid; highBidder=i; firstBid=false; passesInARow=0; }
    else { passesInARow++; }
    step();
   });
  }
 }
 modal.style.display="flex";
 modal.innerHTML=`<div class="cityBox"><div class="cityTitle">🔨 オークション開始</div>
   <div class="auctItem">${w.type==='prem'?'⭐':'🍷'} ${nm}</div>
   <div class="auctInfo">開始価格 ${startPrice}（価値 ${w.value}）</div>
   <div class="cityEmpty">入札を募っています…</div></div>`;
 setTimeout(step,900);
}
/* 人間プレイヤーへの入札プロンプト */
function showBidPrompt(p,nm,nextBid,highBid,highBidder,cb){
 const modal=document.getElementById("cityModal");
 const leader = highBidder>=0?`現在の最高：${players[highBidder].pname} の ${highBid}`:'まだ入札なし';

 modal.innerHTML=`<div class="cityBox"><div class="cityTitle">🔨 オークション</div>
   <div class="auctItem">${nm}</div>
   <div class="auctInfo">${leader}</div>
   <div class="auctYou">${p.pname} の番　💰${p.money}</div>
   <button class="cbtn list bidBtn" ${p.money<nextBid?'disabled':''}>${nextBid} で入札</button>
   <button class="cityClose passBtn">パスする</button></div>`;
 const bidBtn=modal.querySelector(".bidBtn"); if(bidBtn) bidBtn.onclick=()=>cb(true);
 modal.querySelector(".passBtn").onclick=()=>cb(false);
}
function buyCityWine(p,pIdx,m){
 if(!m) return; const gi=wineMarket.indexOf(m); if(gi<0) return;
 if(p.money<m.price) return;
 p.money-=m.price; p.wines.push(m.w); p.value+=m.w.value;
 players[m.sellerIdx].money+=m.price;
 wineMarket.splice(gi,1);
 checkSets(p);  // 買ってコレクションが進むかも

/* 売る/持つ選択モーダル */
function openWineSaleModal(p, newWines, done){

 const modal=document.getElementById("saleModal"); if(!modal){ done(); return; }
 modal.style.display="flex";
 const render=()=>{
  // 保有数の集計

/* NPCの分岐選択：未取得産地に最短で近づく方向を選ぶ（簡易BFS距離） */
function npcChoose(choices){
 const dist=bfsToNearestUnowned(curP().posCell);
 let best=choices[0], bestD=Infinity;
 for(const id of choices){
  const d=dist[id]===undefined?999:dist[id];
  if(d<bestD){bestD=d;best=id;}
 }
 return best;
}
function bfsToNearestUnowned(start){
 // 各セルから「最寄りの未取得産地までの距離」を求めるため、未取得産地を起点に逆BFS
 const dist={}; const q=[];
 for(const k in REGIONS){ if(k!=="paris" && (owned[k]===undefined||owned[k]===null)){ const id="R_"+k; dist[id]=0; q.push(id);} }
 while(q.length){ const id=q.shift(); for(const nx of CELLS[id].next){ if(dist[nx]===undefined){dist[nx]=dist[id]+1;q.push(nx);} } }
 return dist;
}
/* 現在地から注目産地までの最短マス数（BFS）。届かなければnull */
function distanceToSpotlight(){
 if(!spotlightRegion) return null;
 const goal="R_"+spotlightRegion; const start=curP().posCell;
 if(!CELLS[goal]||!CELLS[start]) return null;
 const dist={[start]:0}; const q=[start];
 while(q.length){ const id=q.shift(); if(id===goal) return dist[id];
  for(const nx of CELLS[id].next){ if(dist[nx]===undefined){dist[nx]=dist[id]+1;q.push(nx);} } }
 return dist[goal]!==undefined?dist[goal]:null;
}
/* あるマスから注目産地までの最短距離（BFS） */
function distFromCellToSpotlight(cellId){
 if(!spotlightRegion) return Infinity;
 const goal="R_"+spotlightRegion; if(!CELLS[goal]||!CELLS[cellId]) return Infinity;
 const dist={[cellId]:0}; const q=[cellId];
 while(q.length){ const id=q.shift(); if(id===goal) return dist[id];
  for(const nx of CELLS[id].next){ if(dist[nx]===undefined){dist[nx]=dist[id]+1;q.push(nx);} } }
 return Infinity;
}
/* 現在の分岐候補のうち、注目産地に最も近づく選択肢を返す（近道の矢印用） */

/* コレクション判定：
   - 地理セット＝各産地に畑を建てる（土地の制覇・従来通り）
   - タイプコレクション＝手元に赤/白/泡/ロゼのワインを持つ（造っても買ってもOK）
   - 産地コレクション＝手元に持つワインの産地の種類数（節目でボーナス）
   - ヴィンテージコレクション＝手元に持つワインの当たり年の種類数
   ワインを売ると手元から消え、コレクションからも外れる。 */
function checkSets(p){
 p._geoDone=p._geoDone||{}; p._typeDone=p._typeDone||{};
 p._regionTiers=p._regionTiers||{}; p._vintTiers=p._vintTiers||{};
 // 地理セット（畑の制覇）
 for(const s in GEO_SETS){ if(!p._geoDone[s] && GEO_SETS[s].every(k=>p.assets[k]&&p.assets[k].vineyard)){ p._geoDone[s]=true; addBonus(p,"geoSet",CONFIG.bonus.geoSet); toast(`🗺 地理セット「${s}」完成！（畑を制覇）+${CONFIG.bonus.geoSet}`);} }
 // 手元のワインからタイプ・産地・年を集計
 const heldTypes=new Set(), heldRegions=new Set(), heldVintages=new Set();
 p.wines.forEach(w=>{ const t=REGION_TYPE[w.region]; if(t)heldTypes.add(t); heldRegions.add(w.region); if(w.vintage)heldVintages.add(w.vintage); });
 // タイプコレクション：4タイプ揃うごと（保有ベース）
 for(const s in TYPE_SETS){ if(!p._typeDone[s] && heldTypes.has(s)){ /* 個別タイプ所持は記録のみ */ } }
 if(!p._typeCollDone && heldTypes.size>=4){ p._typeCollDone=true; addBonus(p,"typeColl",CONFIG.bonus.typeSet); toast(`🍷 タイプコレクション完成！赤白泡ロゼを保有 +${CONFIG.bonus.typeSet}`); }
 // 産地コレクション：5産地ごとに小ボーナス、全産地でコンプ大ボーナス
 const totalRegions=Object.keys(REGION_TYPE).length;
 [5,10].forEach(tier=>{ if(!p._regionTiers[tier] && heldRegions.size>=tier){ p._regionTiers[tier]=true; addBonus(p,"regionColl",CONFIG.bonus.regionColl); toast(`🗺 産地コレクション ${tier}産地達成！ +${CONFIG.bonus.regionColl}`);} });
 if(!p._regionTiers.full && heldRegions.size>=totalRegions){ p._regionTiers.full=true; addBonus(p,"regionColl",CONFIG.bonus.regionCompleteBonus); toast(`🏆 全産地コンプリート！ +${CONFIG.bonus.regionCompleteBonus}`); }
 // ヴィンテージコレクション：異なる当たり年3種・5種ごと
 [3,5].forEach(tier=>{ if(!p._vintTiers[tier] && heldVintages.size>=tier){ p._vintTiers[tier]=true; addBonus(p,"vintageColl",CONFIG.bonus.vintageColl); toast(`📅 ヴィンテージコレクション ${tier}年代！ +${CONFIG.bonus.vintageColl}`);} });
}

const CARD_DEFS={

function useCard(idx){
 const p=curP(); if(p.isNpc)return; const key=p.hand[idx]; if(!key)return;
 if(rolling||moving||awaitingPick){ toast("今はカードを使えない"); return; }
 const d=CARD_DEFS[key]; if(!d)return;
 let consumed=true;
 if(d.special){
  // 個別処理カード（対象/産地選択が要るものは選択後に消費）
  switch(d.special){
   case"warp": openWarp(p); consumed=false; break;
   case"sabotage": openSabotage(p); consumed=false; break;
   case"stealGrapes": if(!stealResource(p,"grapes",2)){ consumed=false; } break;
   case"pinpoint": pinpointNext=true; toast("🎯 次は好きな目を出せる"); break;
   case"quickBuild": if(!quickBuildVineyard(p)){ consumed=false; } break;
   case"aging": p.wines.forEach(w=>{w.value+=5;p.value+=5;}); toast("⏳ 熟成！ワイン全部の価値+5"); break;
   case"foresee": toast(nextVintageGreat&&REGIONS[nextVintageGreat]&&season<CONFIG.totalSeasons ? `🔮 来季の当たり年は ${REGIONS[nextVintageGreat].name}！` : "🔮 これが最終シーズン、来季はない"); break;
   case"passCritic": openPassCritic(p,idx); consumed=false; break;
  }
 }else if(d.eff){
  const e=d.eff;
  if(e.addDice){ pendingBonus+=e.addDice; toast(`${d.icon} ${d.name}！次のサイコロ+${e.addDice}`); }
  if(e.dice2){ pendingDice2=true; toast(`${d.icon} 倍速！サイコロ2個`); }
  if(e.grapes){ p.grapes+=e.grapes; }
  if(e.barrels){ p.barrels+=e.barrels; }
  if(e.money){ p.money+=e.money; }
  if(e.defend){ p.defended=true; toast("🛡 防御をセット（次の評論家を無効化）"); }
  if(e.quizPass){ p.quizPass=true; toast("📖 次のクイズは自動正解"); }
  if(e.grapes||e.barrels||e.money){ toast(`${d.icon} ${d.name}！`); }
 }
 if(consumed){ p.hand.splice(idx,1); renderHUD(); }
}

/* 資源を他プレイヤーから奪う共通処理 */
function stealResource(p,res,amt){
 let victim=null,max=-1; players.forEach((o,i)=>{ if(i!==cur&&o[res]>max){max=o[res];victim=o;} });
 if(victim && victim[res]>0){ const take=Math.min(amt,victim[res]); victim[res]-=take; p[res]+=take;
  toast(`${res==='grapes'?'🍇':'💰'} ${victim.pname} から ${take} 奪った！`); renderHUD(); return true; }
 toast("奪える相手がいない（カードは温存）"); return false;
}

/* 資産の内訳を計算 */
function assetBreakdown(p){
 // ワイン価値をプレミアム/量産に分ける
 let premV=0,stdV=0,premN=0,stdN=0;
 p.wines.forEach(w=>{ if(w.type==='prem'){premV+=w.value;premN++;} else {stdV+=w.value;stdN++;} });
 const bl=p.bonusLog||{};
 const bonusTotal=(bl.monopoly||0)+(bl.geoSet||0)+(bl.typeColl||0)+(bl.regionColl||0)+(bl.vintageColl||0)+(bl.spotlight||0);
 return { premV,stdV,premN,stdN, money:p.money, assetWorth:assetWorth(p), bl, bonusTotal, parker:Math.round(p.parkerDelta||0), total:totalAssets(p) };
}
