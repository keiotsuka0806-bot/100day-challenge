<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <title>QRでその場ライブ投票</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>📊 その場ライブ投票</h1>
    <p class="tagline" id="tagline">質問を作ってQRを見せるだけ。みんなの答えがその場で集まる。</p>
  </header>

  <main>
    <!-- 作成画面 -->
    <section id="createView" class="view card">
      <div id="myPolls" class="my-polls hidden"></div>
      <h2>その場ライブ投票をつくる</h2>
      <div class="field">
        <span>何を決めたい？</span>
        <div id="scenePicker" class="scene-picker"></div>
      </div>
      <label class="field">
        <span>質問</span>
        <input id="question" type="text" placeholder="例：今日の二次会、行く？" maxlength="120" />
      </label>
      <div class="field">
        <span>集計のしかた</span>
        <div id="namedToggle" class="seg">
          <button type="button" class="seg-btn" data-named="false">🙈 匿名で集計</button>
          <button type="button" class="seg-btn" data-named="true">🙋 だれが選んだか表示</button>
        </div>
      </div>
      <div class="field">
        <span>投票のしかた</span>
        <div id="modeToggle" class="seg">
          <button type="button" class="seg-btn" data-mode="open">🍻 その場でみんな（1台で何人でも）</button>
          <button type="button" class="seg-btn" data-mode="strict">🛡 1人1票（SNS公開向け）</button>
        </div>
        <p class="mode-hint">SNSなどで広く公開するなら「1人1票」がおすすめ（なりすまし・連投を防ぎます）。</p>
      </div>
      <div id="createBody"></div>
      <button id="createBtn" class="btn btn-primary big">この内容で投票を作る</button>
      <p class="mode-note" id="modeNote"></p>
    </section>

    <!-- 主催者画面 -->
    <section id="hostView" class="view card hidden">
      <span id="hostBadge" class="scene-badge"></span>
      <h2 id="hostQuestion" class="poll-question"></h2>
      <div class="qr-wrap">
        <div id="qrcode"></div>
        <p class="hint">このQRをスマホで読み取ると投票できます</p>
        <div class="url-row">
          <input id="voteUrl" type="text" readonly />
          <button id="copyBtn" class="btn small">コピー</button>
        </div>
      </div>
      <div id="hostResults" class="results"></div>
      <p class="total" id="hostTotal"></p>
      <button id="hostVoteBtn" class="btn btn-primary big">🗳 自分も投票する</button>
      <button id="newPollBtn" class="btn btn-ghost">別の投票を作る</button>
    </section>

    <!-- 投票画面 -->
    <section id="voteView" class="view card hidden">
      <button id="voteBackHost" class="btn btn-ghost small back-btn hidden">← 主催者画面にもどる</button>
      <h2 id="voteQuestion" class="poll-question"></h2>
      <p id="voteHint" class="vote-hint hidden"></p>
      <label id="voteNameField" class="field hidden">
        <span>あなたの名前</span>
        <input id="voterName" type="text" maxlength="20" placeholder="例：田中" />
      </label>
      <div id="voteOptions" class="vote-options"></div>
      <div id="voteAddRow" class="vote-add-row hidden">
        <input id="voteAddInput" type="text" maxlength="60" placeholder="自分の候補を入力（例：ハイボール）" />
        <button id="voteAddBtn" type="button" class="btn btn-ghost small">＋ 追加</button>
      </div>
      <button id="voteSubmitBtn" class="btn btn-primary big hidden">この内容で投票</button>
      <div id="voteThanks" class="thanks hidden">
        <p class="thanks-title">投票ありがとう！🎉</p>
        <div id="voteResults" class="results"></div>
        <p class="total" id="voteTotal"></p>
        <div class="thanks-actions">
          <button id="reVoteBtn" type="button" class="btn btn-ghost small">↻ 投票し直す</button>
          <button id="addVoteBtn" type="button" class="btn btn-ghost small hidden">＋ もう一人分入れる</button>
        </div>
      </div>
    </section>

    <section id="notFound" class="view card hidden">
      <h2>投票が見つかりません</h2>
      <p class="hint">リンクが正しいか確認してください。デモモードでは、作った端末以外からは見えません（本番リアルタイムは下記READMEのFirebase設定で有効化）。</p>
      <button id="goCreateBtn" class="btn btn-primary">投票を作る</button>
    </section>
  </main>

  <!-- QR生成 -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <!-- Firebase（任意）：firebase-config.js があればリアルタイム同期に昇格 -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js" onerror="window.__noFirebaseConfig=true"></script>
  <script src="app.js"></script>
</body>
</html>
