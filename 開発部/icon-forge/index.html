<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IconForge — ロゴ1枚からPWAアイコン一式を生成</title>
<meta name="description" content="画像を1枚入れるだけで、PWAに必要な全サイズのアイコンとmanifest断片を、ブラウザ内で一括生成してzipでダウンロード。">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16213e">
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<header class="app-header">
  <h1>IconForge</h1>
  <p class="tagline">ロゴを1枚入れるだけ。PWAアイコンの“全サイズ詰め合わせ”が出てきます。</p>
</header>

<main class="layout">
  <section class="left">
    <div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="画像をドロップまたは選択">
      <div class="dz-inner">
        <div class="dz-icon">📁</div>
        <p class="dz-main">ここにロゴ画像をドラッグ</p>
        <p class="dz-sub">またはクリックして選択（正方形・512px以上推奨）</p>
      </div>
      <input id="fileInput" type="file" accept="image/*" hidden>
    </div>

    <fieldset class="options">
      <legend>オプション</legend>
      <label class="opt">
        <input type="checkbox" id="optMaskable" checked>
        <span>maskable用に安全余白（10%）を足す</span>
      </label>
      <label class="opt">
        <span>背景色（透過画像の下地）</span>
        <input type="color" id="optBg" value="#ffffff">
      </label>
    </fieldset>

    <button id="downloadBtn" class="primary" disabled>zipでまとめてダウンロード</button>
    <p class="hint">画像はこのブラウザの中だけで処理され、どこにもアップロードされません。</p>
  </section>

  <section class="right">
    <h2 class="section-title">生成されるアイコン</h2>
    <div id="grid" class="grid">
      <p class="empty" id="emptyMsg">まだ画像が入っていません。左に1枚ドロップしてください。</p>
    </div>

    <details class="manifest-box" id="manifestBox" hidden>
      <summary>manifest.json に貼り付ける断片（アイコンの対応表）</summary>
      <pre id="manifestSnippet"></pre>
      <button id="copyManifest" class="ghost">この断片をコピー</button>
    </details>
  </section>
</main>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  }
</script>
</body>
</html>
