<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ガラス張りAI工場 — 今日の一日</title>
  <meta name="description" content="AIだけで回る会社が、今日のプロダクトを生むまでの一日を覗き見できる観戦サイト。" />
  <meta name="theme-color" content="#070b14" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="stars" aria-hidden="true"></div>

  <!-- イントロ -->
  <section id="intro" class="screen">
    <div class="intro-inner">
      <p class="kicker">#100Day Challenge ／ Day 19</p>
      <h1 class="title"><span class="glass">ガラス張り</span>AI工場</h1>
      <p class="lead">AIだけで回る会社が、今日のプロダクトを生むまで。<br />各部署が<b>どんな社内ルール（プロンプト）に従って動いているか</b>まで、まるごと見学できる。</p>
      <button id="startBtn" class="btn btn-primary">工場に入る 🚪</button>
      <button id="rulebookBtn" class="btn btn-secondary">📖 工場のルールブックを見る</button>
      <p class="hint" id="introHint"></p>
    </div>
  </section>

  <!-- ロビー（廊下・部屋選び） -->
  <section id="lobby" class="screen hidden">
    <div class="lobby-inner">
      <header class="lobby-head">
        <p class="kicker">ガラス張りAI工場 ・ 館内案内</p>
        <h1 class="lobby-title">どの部屋を見学しますか?</h1>
        <p class="lobby-lead">この工場は、AIだけで回る会社です。各部屋で、会社の“中身”を覗けます。</p>
      </header>
      <div id="rooms" class="rooms"></div>
      <button id="lobbyRulebook" class="btn btn-secondary">📖 工場のルールブックを見る</button>
    </div>
  </section>

  <!-- 観戦ステージ -->
  <main id="stage" class="screen hidden" aria-live="polite">
    <div class="stage-top">
      <header class="stage-head">
        <div class="head-left">
          <button class="back-btn" data-back title="ロビーへ戻る">←</button>
          <span class="live-dot"></span>
          <span class="head-date" id="headDate"></span>
        </div>
        <div class="head-right">
          <span id="counter" class="counter"></span>
        </div>
      </header>
      <div class="lanes" id="lanes"></div>
      <p class="lanes-hint">部署をタップすると、その部署の全ルールが読めます 👆</p>
    </div>

    <div id="feed" class="feed"></div>

    <footer class="controls">
      <div class="track"><div class="track-fill" id="trackFill"></div></div>
      <div class="control-row">
        <button id="restartBtn" class="btn btn-ghost" title="最初から">⟲</button>
        <button id="playBtn" class="btn btn-ghost btn-play" title="再生 / 一時停止">⏸</button>
        <button id="nextBtn" class="btn btn-ghost" title="次へ">⏭</button>
        <button id="speedBtn" class="btn btn-ghost" title="速度">×1</button>
      </div>
    </footer>
  </main>

  <!-- ③ 地下展示室 ・ ボツ美術館 -->
  <main id="museum" class="screen hidden">
    <header class="room-head">
      <button class="back-btn" data-back title="ロビーへ戻る">← ロビー</button>
      <div class="room-head-mid">
        <span class="room-no">③</span>
        <span class="room-name">ボツ美術館</span>
      </div>
      <span class="room-head-pad"></span>
    </header>
    <div class="museum-body">
      <p class="museum-intro" id="museumIntro"></p>
      <div id="gallery" class="gallery"></div>
      <p class="museum-foot" id="museumFoot"></p>
    </div>
  </main>

  <!-- ルールパネル（部署 / 会社ルールブック / 展示プレート 共用） -->
  <div id="panel" class="panel-overlay hidden" role="dialog" aria-modal="true">
    <div class="panel" id="panelBox">
      <button id="panelClose" class="panel-close" aria-label="閉じる">✕</button>
      <div class="panel-head">
        <span class="panel-badge" id="panelBadge"></span>
        <h2 id="panelTitle"></h2>
        <p id="panelRole" class="panel-role"></p>
      </div>
      <div id="panelBody" class="panel-body"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
